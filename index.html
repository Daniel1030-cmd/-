<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채용관리시스템 (ATS)</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Malgun Gothic',sans-serif;
}
body{
    background:#f4f6f9;
}
.header{
    height:70px;
    background:#1f2937;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    font-size:24px;
    font-weight:bold;
}
.header-left{
    display:flex;
    align-items:center;
}
.header-right{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    font-weight:400;
}
.menu-toggle{
    display:none;
    background:none;
    border:none;
    color:#fff;
    font-size:24px;
    line-height:1;
    cursor:pointer;
    margin-right:16px;
    padding:4px 6px;
}
.container{
    display:flex;
    height:calc(100vh - 70px);
    position:relative;
}
.sidebar{
    width:260px;
    background:#111827;
    color:white;
    overflow-y:auto;
    flex-shrink:0;
}
.sidebar h3{
    padding:20px;
    border-bottom:1px solid #374151;
    cursor:pointer;
}
.sidebar ul{
    list-style:none;
}
.sidebar ul li{
    padding:15px 20px;
    cursor:pointer;
    border-bottom:1px solid #1f2937;
}
.sidebar ul li:hover{
    background:#2563eb;
}
.sidebar h3.active,
.sidebar ul li.active{
    background:#2563eb;
}
.sidebar-backdrop{
    display:none;
    position:fixed;
    top:70px;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.45);
    z-index:998;
}
.sidebar-backdrop.show{
    display:block;
}
.content{
    flex:1;
    padding:20px;
    overflow-y:auto;
    min-width:0;
}
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.card h2{
    font-size:28px;
    color:#2563eb;
    margin-top:10px;
}
.section{
    margin-top:25px;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    overflow-x:auto;
}
table{
    width:100%;
    min-width:560px;
    border-collapse:collapse;
}
table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
table th{
    background:#f3f4f6;
}

/* ===== 추가 UI 요소 ===== */
.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    flex-wrap:wrap;
    gap:10px;
}
.filter-bar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.filter-bar input,
.filter-bar select{
    padding:9px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}
.btn{
    padding:8px 16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    transition:opacity .15s;
}
.btn:hover{opacity:.85;}
.btn-primary{background:#2563eb;color:#fff;}
.btn-secondary{background:#6b7280;color:#fff;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-success{background:#16a34a;color:#fff;}
.btn-sm{padding:5px 10px;font-size:12px;}
td.actions{
    display:flex;
    gap:6px;
    justify-content:center;
    flex-wrap:wrap;
}
.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:600;
    color:#fff;
    white-space:nowrap;
}
.badge-gray{background:#6b7280;}
.badge-orange{background:#f59e0b;}
.badge-blue{background:#2563eb;}
.badge-red{background:#ef4444;}
.badge-purple{background:#8b5cf6;}
.badge-indigo{background:#6366f1;}
.badge-green{background:#16a34a;}
.badge-active{background:#2563eb;}
.badge-closed{background:#6b7280;}

.empty{
    text-align:center;
    color:#9ca3af;
    padding:30px !important;
}

.modal-overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.5);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}
.modal{
    background:#fff;
    border-radius:10px;
    padding:25px;
    width:460px;
    max-width:100%;
    max-height:85vh;
    overflow-y:auto;
}
.modal h3{
    margin-bottom:18px;
    font-size:18px;
    color:#111827;
}
.form-group{
    margin-bottom:14px;
}
.form-group label{
    display:block;
    margin-bottom:5px;
    font-size:13px;
    color:#374151;
    font-weight:500;
}
.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:9px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
}
.form-hint{
    font-size:12px;
    color:#9ca3af;
    margin-top:4px;
}
.resume-current{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:8px;
    font-size:13px;
    color:#374151;
    background:#f3f4f6;
    border-radius:6px;
    padding:8px 10px;
}
.resume-current a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}
.resume-current a:hover{text-decoration:underline;}
.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:20px;
}

.analytics-bar-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
}
.analytics-bar-label{
    width:110px;
    font-size:13px;
    color:#374151;
    flex-shrink:0;
}
.analytics-bar-track{
    flex:1;
    background:#e5e7eb;
    border-radius:6px;
    height:18px;
    overflow:hidden;
}
.analytics-bar-fill{
    height:100%;
    background:#2563eb;
    border-radius:6px;
    transition:width .3s;
}
.analytics-bar-count{
    width:36px;
    text-align:right;
    font-size:13px;
    font-weight:600;
    flex-shrink:0;
}

.notif-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:14px 4px;
    border-bottom:1px solid #eee;
}
.notif-item.unread{
    background:#eff6ff;
}
.notif-item:last-child{
    border-bottom:none;
}

@media (max-width:900px){
    .cards{grid-template-columns:repeat(2,1fr);}
}

/* ===== 면접 평가서 자동화 ===== */
.eval-header-bar{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:15px;
}
.eval-back-btn{
    background:none;
    border:1px solid #ddd;
    border-radius:6px;
    padding:7px 14px;
    cursor:pointer;
    font-size:13px;
    color:#374151;
}
.eval-back-btn:hover{background:#f3f4f6;}
.eval-candidate-card{
    background:#f9fafb;
    border:1px solid #e5e7eb;
    border-radius:8px;
    padding:14px 16px;
    margin-bottom:18px;
    font-size:14px;
    color:#374151;
}
.eval-candidate-card b{color:#111827;}
.eval-layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    align-items:start;
}
@media (max-width:1100px){
    .eval-layout{grid-template-columns:1fr;}
}
.eval-comp-block{
    border:1px solid #e5e7eb;
    border-radius:8px;
    padding:14px;
    margin-bottom:12px;
    background:#fafafa;
}
.eval-comp-block .comp-title-row{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}
.eval-comp-block .comp-title-row input{
    flex:1;
}
.eval-add-block-btn{
    width:100%;
    padding:10px;
    border:1px dashed #9ca3af;
    background:#fff;
    border-radius:8px;
    color:#6b7280;
    cursor:pointer;
    font-size:13px;
    margin-bottom:10px;
}
.eval-add-block-btn:hover{background:#f3f4f6;}
.eval-preview{
    background:#fef9c3;
    border:1px solid #fde047;
    border-radius:6px;
    padding:20px;
    font-size:14px;
    line-height:1.7;
    white-space:pre-wrap;
    min-height:200px;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.eval-preview-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
    flex-wrap:wrap;
}
.badge-eval-done{
    background:#0d9488;
}

/* ===== 로그인 화면 ===== */
.login-screen{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:#111827;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2000;
    padding:20px;
}
.login-box{
    background:#fff;
    border-radius:12px;
    padding:32px;
    width:380px;
    max-width:100%;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}
.login-box h2{
    font-size:20px;
    color:#111827;
    margin-bottom:6px;
}
.login-box p{
    font-size:13px;
    color:#6b7280;
    margin-bottom:20px;
}
.login-error{
    color:#dc2626;
    font-size:13px;
    margin-top:8px;
    display:none;
}

/* ===== 모바일 반응형 ===== */
@media (max-width:768px){
    .menu-toggle{display:block;}
    .sidebar{
        position:fixed;
        top:70px;left:0;
        height:calc(100vh - 70px);
        z-index:999;
        transform:translateX(-100%);
        transition:transform .25s ease;
        box-shadow:2px 0 12px rgba(0,0,0,.3);
    }
    .sidebar.open{
        transform:translateX(0);
    }
    .header{padding:0 16px;font-size:19px;}
    .content{padding:14px;}
}
@media (max-width:480px){
    .cards{grid-template-columns:1fr;}
    .header{font-size:17px;}
    .header-right{font-size:12px;}
    .modal{padding:18px;}
    .toolbar{flex-direction:column;align-items:stretch;}
    .toolbar .btn{width:100%;}
    .filter-bar input,
    .filter-bar select{flex:1 1 100%;}
    .btn{padding:9px 14px;}
    .btn-sm{padding:7px 11px;}
    table th, table td{padding:8px 6px;font-size:13px;}
}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>채용관리시스템 로그인</h2>
    <p>관리자 계정으로 로그인해주세요.</p>
    <form id="loginForm">
      <div class="form-group"><label>이메일</label><input type="email" name="email" required autocomplete="username"></div>
      <div class="form-group"><label>비밀번호</label><input type="password" name="password" required autocomplete="current-password"></div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">로그인</button>
    </form>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <button type="button" class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">☰</button>
    <span>채용관리시스템 (ATS)</span>
  </div>
  <div class="header-right">
    <span id="authUserLabel"></span>
    <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn" style="display:none;">로그아웃</button>
  </div>
</div>
<div class="container">
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="sidebar">
<h3 data-view="dashboard" class="active">📊 대시보드</h3>
<ul>
<li data-view="jobs">채용공고관리</li>
<li data-view="interviews">면접관리</li>
<li data-view="finalHires">최종합격관리</li>
<li data-view="contracts">계약관리</li>
<li data-view="analytics">채용분석</li>
<li data-view="notifications">알림관리</li>
<li data-view="system">시스템관리</li>
</ul>
</div>
<div class="content" id="content">
<div class="cards">
<div class="card">진행중 공고<h2>0</h2></div>
<div class="card">지원자 수<h2>0</h2></div>
<div class="card">면접 예정<h2>0</h2></div>
<div class="card">최종합격<h2>0</h2></div>
</div>
<div class="section">
<h2 style="margin-bottom:15px;">최근 지원자 현황</h2>
<table>
<thead><tr><th>등록일</th><th>성명</th><th>지원직무</th><th>경력</th><th>상태</th></tr></thead>
<tbody><tr><td colspan="5" class="empty">불러오는 중...</td></tr></tbody>
</table>
</div>
</div>
</div>

<script type="module">
/* =========================================================================
   채용관리시스템(ATS) - Firebase Firestore 연동
   -------------------------------------------------------------------------
   - 이 파일은 빌드 도구(Vite/Webpack 등) 없이 브라우저에서 바로 동작하도록
     Firebase JS SDK를 CDN(ESM)으로 불러옵니다.
   - 만약 React/Vite 같은 번들러 프로젝트에서 사용 중이라면
       npm install firebase
     설치 후 아래 import 구문의 URL 부분만
       import { initializeApp } from "firebase/app";
     형태로 바꿔주면 동일하게 동작합니다.
   - 로그인(Firebase Authentication)을 켜야 정상 동작합니다. Firebase 콘솔에서
     Authentication > Sign-in method > 이메일/비밀번호를 활성화하고,
     Authentication > Users 에서 로그인용 계정을 1개 이상 만들어주세요.
   - 운영 배포 전 Firestore 콘솔에서 보안 규칙을 반드시 설정하세요.
     (하단 "Firestore 보안 규칙" 주석 참고 — 로그인 기능과 함께 적용해야 합니다)
   - 이력서는 별도 Storage 없이 Firestore 문서에 base64 텍스트로 직접
     저장합니다. Firestore 문서 최대 용량(1MB) 제약 때문에 원본 파일
     기준 약 700KB 이하로만 첨부를 허용합니다(코드 내 RESUME_MAX_BYTES).
   ========================================================================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAnalytics, isSupported as isAnalyticsSupported } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc,
  addDoc, updateDoc, deleteDoc, setDoc,
  onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== 사용자가 제공한 Firebase 프로젝트 설정 ===== */
const firebaseConfig = {
  apiKey: "AIzaSyA1wwPmNs9Y_MVCANN6iqj0Nn6H1YHvm3w",
  authDomain: "recruitments-1d3a0.firebaseapp.com",
  projectId: "recruitments-1d3a0",
  storageBucket: "recruitments-1d3a0.firebasestorage.app",
  messagingSenderId: "115005966065",
  appId: "1:115005966065:web:7f6320ef3a862d888c8b50",
  measurementId: "G-363D2G3TFE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Analytics는 일부 환경(로컬 file://, 차단된 네트워크 등)에서 초기화에 실패할 수 있어
// 전체 앱 동작에 영향이 없도록 별도로 감싸서 처리합니다.
isAnalyticsSupported().then(supported => {
  if (supported) {
    try { getAnalytics(app); } catch (e) { console.warn("Analytics 초기화 건너뜀:", e); }
  }
}).catch(() => {});

/* ===== Firestore 컬렉션 참조 =====
   컬렉션은 최초로 문서를 저장하는 순간 자동으로 생성되므로
   콘솔에서 미리 만들어둘 필요는 없습니다. */
const colJobs          = collection(db, "jobPostings");
const colApplicants    = collection(db, "applicants");
const colNotifications = collection(db, "notifications");
const colContracts     = collection(db, "contracts");
const colAdmins        = collection(db, "admins");
const settingsDocRef   = doc(db, "settings", "general");

/* ===== 지원자 상태 정의 =====
   "지원자관리"/"서류전형" 단계가 제거되어, 이제 지원자(후보자)는
   면접관리 화면에서 직접 등록되며 기본 상태는 "면접예정"입니다. */
const APPLICANT_STATUSES = ["면접예정", "면접완료", "최종합격", "불합격"];
const STATUS_BADGE_CLASS = {
  "면접예정":  "badge-purple",
  "면접완료":  "badge-indigo",
  "최종합격":  "badge-green",
  "불합격":    "badge-red"
};

/* ===== 이력서 첨부 제한 =====
   Firestore 문서 최대 크기는 1MB(약 1,048,576바이트)입니다.
   base64로 인코딩하면 원본 대비 약 1.37배로 늘어나고, 평가서 등
   다른 필드도 같은 문서에 함께 저장되므로 여유를 두어 원본 파일
   기준 700KB로 제한합니다. */
const RESUME_MAX_BYTES = 700 * 1024;

/* ===== 전역 캐시 (실시간 동기화) ===== */
let jobsCache = [];
let applicantsCache = [];
let notificationsCache = [];
let contractsCache = [];
let adminsCache = [];
let settingsCache = {};
let currentView = "dashboard";

/* 면접관리 화면의 검색 상태 */
let interviewSearchTerm = "";

/* 면접 평가서(템플릿 기반 자동화) 작성 화면 상태 */
let evaluationApplicantId = null;
let evalDraft = null;
let evalIdSeq = 0;
function uid() { evalIdSeq += 1; return "c" + evalIdSeq + "_" + Date.now(); }
const CIRCLED_NUMS = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮"];

const contentEl = document.getElementById("content");

/* ===== 공용 유틸 ===== */
function esc(str) {
  if (str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function fmtDate(ts) {
  if (!ts) return "-";
  const d = typeof ts.toDate === "function" ? ts.toDate() : new Date(ts);
  if (isNaN(d.getTime())) return "-";
  return d.toLocaleDateString("ko-KR");
}
function fmtDateTime(ts) {
  if (!ts) return "-";
  const d = typeof ts.toDate === "function" ? ts.toDate() : new Date(ts);
  if (isNaN(d.getTime())) return "-";
  return d.toLocaleString("ko-KR");
}
function fmtBytes(bytes) {
  if (!bytes) return "0KB";
  if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + "KB";
  return (bytes / (1024 * 1024)).toFixed(1) + "MB";
}
function badge(status, type = "applicant") {
  if (type === "job") {
    return `<span class="badge ${status === "진행중" ? "badge-active" : "badge-closed"}">${esc(status)}</span>`;
  }
  const cls = STATUS_BADGE_CLASS[status] || "badge-gray";
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}
function getApplicantName(id) {
  const a = applicantsCache.find(x => x.id === id);
  return a ? a.name : "지원자";
}
async function createNotification(message, type = "info") {
  try {
    await addDoc(colNotifications, { message, type, read: false, createdAt: serverTimestamp() });
  } catch (e) {
    console.error("알림 생성 실패", e);
  }
}

/* ===== 모달 공용 헬퍼 ===== */
function showModal(html) {
  closeModal();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "modalOverlay";
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() {
  const overlay = document.getElementById("modalOverlay");
  if (overlay) overlay.remove();
}

/* ===== 파일 → base64 변환 헬퍼 (이력서 첨부용) ===== */
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

/* =========================================================================
   렌더링 라우터
   ========================================================================= */
function rerender() {
  switch (currentView) {
    case "dashboard":   renderDashboard(); break;
    case "jobs":        renderJobs(); break;
    case "interviews":  renderInterviews(); break;
    case "finalHires":  renderFinalHires(); break;
    case "contracts":   renderContracts(); break;
    case "analytics":   renderAnalytics(); break;
    case "notifications": renderNotifications(); break;
    case "system":      renderSystem(); break;
    case "evaluationForm": renderEvaluationForm(); break;
  }
}
function switchView(view) {
  currentView = view;
  document.querySelectorAll(".sidebar [data-view]").forEach(el => {
    el.classList.toggle("active", el.dataset.view === view);
  });
  rerender();
}

      ? `<a href="javascript:void(0)" data-action="view-resume" data-id="${a.id}">${esc(a.resume.fileName || "이력서")}</a>`
      : `<span style="color:#9ca3af;">미첨부</span>`;

          ? `<button class="btn btn-primary btn-sm" data-action="interview-done" data-id="${a.id}">면접완료</button>`
          : (a.status === "면접완료"
            ? `<button class="btn btn-success btn-sm" data-action="interview-pass" data-id="${a.id}">최종합격</button>
               <button class="btn btn-danger btn-sm" data-action="interview-fail" data-id="${a.id}">불합격</button>`
            : "")}
        <button class="btn btn-danger btn-sm" data-action="remove-applicant" data-id="${a.id}">삭제</button>

    </tr>`;
  }).join("") : `<tr><td colspan="8" class="empty">${interviewSearchTerm ? "검색 결과가 없습니다." : "등록된 면접 대상자가 없습니다."}</td></tr>`;

      <div class="toolbar">
        <h2>면접관리</h2>
        <button class="btn btn-primary" data-action="open-applicant-modal">+ 면접 대상자 등록</button>

function openApplicantModal(id) {
  const applicant = id ? applicantsCache.find(a => a.id === id) : null;
  const jobOptions = jobsCache.length
    ? `<option value="">직접입력(아래 직무명 사용)</option>` + jobsCache.map(j =>
        `<option value="${j.id}" ${applicant && applicant.jobPostingId === j.id ? "selected" : ""}>${esc(j.title)}</option>`).join("")
    : `<option value="">등록된 공고가 없습니다</option>`;

  const resumeInfo = applicant && applicant.resume && applicant.resume.dataUrl
    ? `<div class="resume-current">
         <span>현재 첨부: <a href="javascript:void(0)" data-action="view-resume" data-id="${applicant.id}">${esc(applicant.resume.fileName)}</a> (${fmtBytes(applicant.resume.size)})</span>
         <button type="button" class="btn btn-danger btn-sm" id="removeResumeBtn" style="margin-left:auto;">첨부삭제</button>
       </div>`
    : "";

  showModal(`
    <h3>${applicant ? "면접 대상자 정보 수정" : "면접 대상자 등록"}</h3>
    <form id="applicantForm">
      <div class="form-group"><label>성명</label><input name="name" required value="${applicant ? esc(applicant.name) : ""}"></div>
      <div class="form-group"><label>지원직무(채용공고 선택)</label><select name="jobPostingId">${jobOptions}</select></div>
      <div class="form-group"><label>직무명 (공고를 선택하지 않은 경우 직접 입력)</label><input name="jobTitleManual" placeholder="예: 백엔드 개발자" value="${applicant && !applicant.jobPostingId ? esc(applicant.jobTitle || "") : ""}"></div>
      <div class="form-group"><label>경력</label><input name="experience" placeholder="예: 3년 / 신입" value="${applicant ? esc(applicant.experience || "") : ""}"></div>
      <div class="form-group"><label>연락처</label><input name="phone" value="${applicant ? esc(applicant.phone || "") : ""}"></div>
      <div class="form-group"><label>이메일</label><input type="email" name="email" value="${applicant ? esc(applicant.email || "") : ""}"></div>
      <div class="form-group"><label>면접일시</label>
        <div style="display:flex;gap:8px;">
          <input type="date" name="interviewDate" value="${applicant ? (applicant.interviewDate || "") : ""}" style="flex:1;">
          <input type="time" name="interviewTime" value="${applicant ? (applicant.interviewTime || "") : ""}" style="flex:1;">
        </div>
      </div>
      <div class="form-group">
        <label>이력서 첨부 (PDF/이미지/문서, 약 700KB 이하)</label>
        <input type="file" name="resumeFile" id="resumeFileInput" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg">
        <div class="form-hint">파일은 별도 저장소 없이 시스템 내부(Firestore)에 직접 저장되며, 용량 제한으로 큰 파일은 첨부되지 않습니다.</div>
        ${resumeInfo}
      </div>
      ${applicant ? `
      <div class="form-group"><label>상태</label>
        <select name="status">${APPLICANT_STATUSES.map(s => `<option value="${s}" ${applicant.status === s ? "selected" : ""}>${s}</option>`).join("")}</select>
      </div>` : ""}
      <div class="form-group"><label>비고</label><textarea name="notes" rows="3">${applicant ? esc(applicant.notes || "") : ""}</textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-action="close-modal">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>`);

  // 첨부 삭제 체크 플래그(폼 제출 시 참조)
  let removeResumeFlag = false;
  const removeBtn = document.getElementById("removeResumeBtn");
  if (removeBtn) {
    removeBtn.addEventListener("click", () => {
      removeResumeFlag = true;
      removeBtn.closest(".resume-current").innerHTML = `<span style="color:#9ca3af;">첨부가 삭제됩니다. 저장을 눌러 확정하세요.</span>`;
    });
  }

  document.getElementById("applicantForm").addEventListener("submit", async e => {
    e.preventDefault();
    const formEl = e.target;
    const fd = new FormData(formEl);
    const jobId = fd.get("jobPostingId") || null;
    const job = jobsCache.find(j => j.id === jobId);
    const manualTitle = (fd.get("jobTitleManual") || "").trim();

    const data = {
      name: fd.get("name").trim(),
      jobPostingId: jobId,
      jobTitle: job ? job.title : (manualTitle || "-"),
      experience: fd.get("experience").trim(),
      phone: fd.get("phone").trim(),
      email: fd.get("email").trim(),
      interviewDate: fd.get("interviewDate") || "",
      interviewTime: fd.get("interviewTime") || "",
      notes: fd.get("notes").trim()
    };

    // 이력서 파일 처리
    const fileInput = document.getElementById("resumeFileInput");
    const file = fileInput && fileInput.files && fileInput.files[0];

    if (file) {
      if (file.size > RESUME_MAX_BYTES) {
        alert(`이력서 파일이 너무 큽니다. 약 ${fmtBytes(RESUME_MAX_BYTES)} 이하 파일만 첨부할 수 있습니다.\n선택한 파일: ${fmtBytes(file.size)}`);
        return;
      }
      try {
        const dataUrl = await readFileAsDataURL(file);
        data.resume = {
          fileName: file.name,
          mimeType: file.type || "application/octet-stream",
          size: file.size,
          dataUrl
        };
      } catch (err) {
        alert("이력서 파일을 읽는 중 오류가 발생했습니다: " + err.message);
        return;
      }
    } else if (removeResumeFlag) {
      data.resume = null;
    }

    try {
      if (applicant) {
        data.status = fd.get("status");
        await updateDoc(doc(db, "applicants", applicant.id), data);
      } else {
        await addDoc(colApplicants, {
          ...data,
          resume: data.resume || null,
          status: "면접예정",
          createdAt: serverTimestamp(),
          contractCreated: false
        });
        if (settingsCache.autoNotify !== false) {
          createNotification(`${data.name}님이 면접 대상자로 등록되었습니다.`, "interview");
        }
      }
      closeModal();
    } catch (err) {
      if (err && err.message && /longer than|exceeds|size/i.test(err.message)) {
        alert("저장 중 오류: 첨부 파일을 포함한 문서 용량이 너무 큽니다. 더 작은 파일로 다시 시도해주세요.");
      } else {
        alert("저장 중 오류가 발생했습니다: " + err.message);
      }
    }
  });
}
async function removeApplicant(id) {

  try { await deleteDoc(doc(db, "applicants", id)); }

async function updateApplicantStatus(id, status, extra = {}) {

      if (status === "불합격")   createNotification(`${getApplicantName(id)}님이 불합격 처리되었습니다.`, "reject");
    }
  } catch (err) {
    alert("상태 변경 중 오류: " + err.message);

/* ===== 이력서 열람 (새 창) ===== */
function viewResume(id) {
  const applicant = applicantsCache.find(a => a.id === id);
  if (!applicant || !applicant.resume || !applicant.resume.dataUrl) {
    alert("첨부된 이력서가 없습니다.");
    return;
  }
  const { dataUrl, mimeType, fileName } = applicant.resume;
  // 이미지/PDF는 새 창에서 바로 표시, 그 외 형식은 다운로드 처리
  if (mimeType && (mimeType.startsWith("image/") || mimeType === "application/pdf")) {
    const w = window.open("", "_blank");
    if (!w) { alert("팝업이 차단되었습니다. 팝업 차단을 해제한 후 다시 시도해주세요."); return; }
    if (mimeType === "application/pdf") {
      w.document.write(`<!DOCTYPE html><html><head><title>${esc(fileName || "이력서")}</title></head>
        <body style="margin:0;"><iframe src="${dataUrl}" style="width:100%;height:100vh;border:none;"></iframe></body></html>`);
    } else {
      w.document.write(`<!DOCTYPE html><html><head><title>${esc(fileName || "이력서")}</title></head>
        <body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;">
          <img src="${dataUrl}" style="max-width:100%;max-height:100vh;">
        </body></html>`);
    }
    w.document.close();
  } else {
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = fileName || "resume";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }
}

/* =========================================================================
   3-2. 면접 평가서 자동화 (템플릿 기반)
   -------------------------------------------------------------------------
   면접관이 항목별로 짧게 입력하면, 정해진 양식(①②③... 번호 + 섹션 구분)에
   맞춰 평가서 본문을 자동으로 조립해줍니다. 외부 AI API 없이 동작하므로
   추가 비용/백엔드 설정이 필요 없습니다.
   ========================================================================= */
function initEvalDraft(applicant) {
  const existing = applicant && applicant.evaluation;
  if (existing && existing.competencies && existing.competencies.length) {
    evalDraft = {
      competencies: existing.competencies.map(c => ({ id: uid(), title: c.title || "", itemsText: c.itemsText || "" })),
      personality: existing.personality || "",
      strengths: existing.strengths || "",
      risks: existing.risks || "",
      comment: existing.comment || "",
      recommendation: existing.recommendation || "채용추천"
    };
  } else {

function numberedList(text) {
  const lines = (text || "").split("\n").map(s => s.trim()).filter(Boolean);
  if (!lines.length) return "";
  return lines.map((line, i) => (CIRCLED_NUMS[i] || (i + 1) + ".") + " " + line).join("\n");
}
function buildEvaluationReport(applicant, draft) {
  const out = [];
  const timeLabel = [applicant.interviewDate, applicant.interviewTime].filter(Boolean).join(" ");
  out.push(`${applicant.name || "후보자"}(${applicant.jobTitle || "-"})${timeLabel ? " - " + timeLabel : ""}`);

  let n = 1;
  draft.competencies.forEach(c => {
    const body = numberedList(c.itemsText);
    if (!c.title.trim() && !body) return;
    out.push("");
    out.push(`${n}. ${c.title.trim() || "역량"} 역량`);
    if (body) out.push(body);
    n++;
  });
  if (draft.personality && draft.personality.trim()) {
    out.push(""); out.push(`${n}. 성격 및 업무 태도`); out.push(numberedList(draft.personality)); n++;
  }
  if (draft.strengths && draft.strengths.trim()) {
    out.push(""); out.push(`${n}. 주요 장점`); out.push(numberedList(draft.strengths)); n++;
  }
  if (draft.risks && draft.risks.trim()) {
    out.push(""); out.push(`${n}. 주요 단점 및 채용 리스크`); out.push(numberedList(draft.risks)); n++;
  }
  out.push("");
  out.push(`[종합의견] ${draft.comment && draft.comment.trim() ? draft.comment.trim() : "-"}`);
  out.push(`[추천여부] ${draft.recommendation || "-"}`);
  return out.join("\n");
}

function syncDraftFromDOM() {
  const form = document.getElementById("evalForm");
  if (!form || !evalDraft) return;
  evalDraft.competencies.forEach(c => {
    const titleEl = form.querySelector(`[data-comp-title="${c.id}"]`);
    const itemsEl = form.querySelector(`[data-comp-items="${c.id}"]`);
    if (titleEl) c.title = titleEl.value;
    if (itemsEl) c.itemsText = itemsEl.value;
  });
  const fields = ["personality", "strengths", "risks", "comment", "recommendation"];
  fields.forEach(name => {
    const el = form.querySelector(`[name="${name}"]`);
    if (el) evalDraft[name] = el.value;
  });
}
function updateEvalPreview() {
  const applicant = applicantsCache.find(a => a.id === evaluationApplicantId);
  const previewEl = document.getElementById("evalPreview");
  if (!applicant || !previewEl || !evalDraft) return;
  previewEl.textContent = buildEvaluationReport(applicant, evalDraft);
}

}
async function saveEvaluation() {
  syncDraftFromDOM();
  const applicant = applicantsCache.find(a => a.id === evaluationApplicantId);
  if (!applicant) return;
  const reportText = buildEvaluationReport(applicant, evalDraft);
  try {
    await updateDoc(doc(db, "applicants", applicant.id), {
      evaluation: {
        competencies: evalDraft.competencies.map(c => ({ title: c.title, itemsText: c.itemsText })),
        personality: evalDraft.personality,
        strengths: evalDraft.strengths,
        risks: evalDraft.risks,
        comment: evalDraft.comment,
        recommendation: evalDraft.recommendation,
        reportText,
        updatedAt: serverTimestamp()
      }

function renderAnalytics() {
  const total = applicantsCache.length;
  const counts = {};
  APPLICANT_STATUSES.forEach(s => { counts[s] = applicantsCache.filter(a => a.status === s).length; });
  const max = Math.max(1, ...Object.values(counts));

  const bars = APPLICANT_STATUSES.map(s => `
    <div class="analytics-bar-row">
      <div class="analytics-bar-label">${s}</div>
      <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${(counts[s] / max * 100)}%"></div></div>
      <div class="analytics-bar-count">${counts[s]}</div>
    </div>`).join("");

  const interviewRate = total ? Math.round((counts["면접예정"] + counts["면접완료"] + counts["최종합격"]) / total * 100) : 0;
  const finalRate = total ? Math.round(counts["최종합격"] / total * 100) : 0;

  const jobActive = jobsCache.filter(j => j.status === "진행중").length;

    const fd = new FormData(e.target);
    const data = {
      companyName: fd.get("companyName").trim(),
      notifyEmail: fd.get("notifyEmail").trim(),
      autoNotify: fd.get("autoNotify") === "on"
    };
    try {
      await setDoc(settingsDocRef, data);
      alert("설정이 저장되었습니다.");
    } catch (err) {
      alert("저장 중 오류: " + err.message);
    }
  });
}
function openAdminModal() {
  showModal(`
    <h3>운영자 추가</h3>
    <form id="adminForm">
      <div class="form-group"><label>이름</label><input name="name" required></div>
      <div class="form-group"><label>이메일</label><input type="email" name="email" required></div>
      <div class="form-group"><label>역할</label><input name="role" placeholder="예: 인사담당자"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-action="close-modal">취소</button>
        <button type="submit" class="btn btn-primary">추가</button>
      </div>
    </form>`);
  document.getElementById("adminForm").addEventListener("submit", async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await addDoc(colAdmins, {
        name: fd.get("name").trim(),
        email: fd.get("email").trim(),
        role: fd.get("role").trim()
      });
      closeModal();
    } catch (err) {
      alert("저장 중 오류: " + err.message);
    }
  });
}
async function removeAdmin(id) {
  if (!confirm("삭제하시겠습니까?")) return;
  try { await deleteDoc(doc(db, "admins", id)); }
  catch (err) { alert("삭제 중 오류: " + err.message); }
}

/* =========================================================================
   이벤트 위임 (클릭 / 변경)
   ========================================================================= */
contentEl.addEventListener("click", e => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;
  switch (action) {
    case "open-job-modal":       openJobModal(); break;
    case "edit-job":             openJobModal(id); break;
    case "remove-job":           removeJob(id); break;

    case "open-applicant-modal": openApplicantModal(); break;
    case "edit-applicant":       openApplicantModal(id); break;
    case "remove-applicant":     removeApplicant(id); break;
    case "view-resume":          viewResume(id); break;

    case "interview-done":       updateApplicantStatus(id, "면접완료"); break;
    case "interview-pass":       updateApplicantStatus(id, "최종합격"); break;
    case "interview-fail":       updateApplicantStatus(id, "불합격"); break;

    case "register-contract":    openContractModal(id); break;
    case "open-contract-modal":  openContractModal(); break;
    case "edit-contract":        openContractModal(null, id); break;
    case "remove-contract":      removeContract(id); break;

    case "mark-notif-read":      markNotificationRead(id); break;
    case "delete-notif":         deleteNotification(id); break;

    case "open-admin-modal":     openAdminModal(); break;
    case "remove-admin":         removeAdmin(id); break;

    case "open-evaluation":      openEvaluationView(id); break;
    case "back-to-interviews":   evaluationApplicantId = null; evalDraft = null; switchView("interviews"); break;
    case "add-comp-block":       addCompetencyBlock(); break;
    case "remove-comp-block":    removeCompetencyBlock(id); break;
    case "save-evaluation":      saveEvaluation(); break;
    case "copy-evaluation":      copyEvaluation(); break;
    case "print-evaluation":     printEvaluation(); break;

    case "close-modal":          closeModal(); break;
  }
});
contentEl.addEventListener("input", e => {
  if (e.target.closest("#evalForm")) {
    syncDraftFromDOM();
    updateEvalPreview();
  }
});

/* =========================================================================
   모바일 사이드바(햄버거 메뉴) 토글
   ========================================================================= */
const sidebarEl = document.querySelector(".sidebar");
const sidebarBackdropEl = document.getElementById("sidebarBackdrop");
const menuToggleEl = document.getElementById("menuToggle");
function toggleSidebar(open) {
  const willOpen = open !== undefined ? open : !sidebarEl.classList.contains("open");
  sidebarEl.classList.toggle("open", willOpen);
  sidebarBackdropEl.classList.toggle("show", willOpen);
}
menuToggleEl.addEventListener("click", () => toggleSidebar());
sidebarBackdropEl.addEventListener("click", () => toggleSidebar(false));

/* =========================================================================
   사이드바 네비게이션
   ========================================================================= */
document.querySelectorAll(".sidebar [data-view]").forEach(el => {
  el.addEventListener("click", () => {
    switchView(el.dataset.view);
    toggleSidebar(false); // 모바일에서는 메뉴 선택 후 자동으로 닫힘
  });
});

/* =========================================================================
   Firestore 실시간 리스너 설정
   ========================================================================= */
function setupListeners() {
  onSnapshot(colJobs, snap => {
    jobsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    jobsCache.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
    rerender();
  }, err => console.error("jobPostings 구독 오류:", err));

  onSnapshot(colApplicants, snap => {
    applicantsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    applicantsCache.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
    rerender();
  }, err => console.error("applicants 구독 오류:", err));

  onSnapshot(colNotifications, snap => {
    notificationsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    notificationsCache.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
    rerender();
  }, err => console.error("notifications 구독 오류:", err));

  onSnapshot(colContracts, snap => {
    contractsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    contractsCache.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
    rerender();
  }, err => console.error("contracts 구독 오류:", err));

  onSnapshot(colAdmins, snap => {
    adminsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    rerender();
  }, err => console.error("admins 구독 오류:", err));

  onSnapshot(settingsDocRef, snap => {
    settingsCache = snap.exists() ? snap.data() : {};
    rerender();
  }, err => console.error("settings 구독 오류:", err));
}

/* =========================================================================
   로그인 화면 / 인증 상태 처리
   -------------------------------------------------------------------------
   Firestore 보안 규칙을 "로그인한 사용자만 허용"으로 설정했기 때문에,
   로그인 전에는 Firestore 구독을 시작하지 않습니다(에러 방지).
   Firebase 콘솔 > Authentication > Sign-in method 에서 이메일/비밀번호
   제공업체를 켜고, Authentication > Users 에서 로그인용 계정을 1개 이상
   만들어주세요.
   ========================================================================= */
const loginScreenEl = document.getElementById("loginScreen");
const loginFormEl = document.getElementById("loginForm");
const loginErrorEl = document.getElementById("loginError");
const authUserLabelEl = document.getElementById("authUserLabel");
const logoutBtnEl = document.getElementById("logoutBtn");
let listenersStarted = false;

loginFormEl.addEventListener("submit", async e => {
  e.preventDefault();
  loginErrorEl.style.display = "none";
  const fd = new FormData(e.target);
  try {
    await signInWithEmailAndPassword(auth, fd.get("email").trim(), fd.get("password"));
  } catch (err) {
    loginErrorEl.textContent = "로그인에 실패했습니다. 이메일 또는 비밀번호를 확인해주세요.";
    loginErrorEl.style.display = "block";
  }
});
logoutBtnEl.addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, user => {
  if (user) {
    loginScreenEl.style.display = "none";
    authUserLabelEl.textContent = user.email || "";
    logoutBtnEl.style.display = "inline-block";
    if (!listenersStarted) {
      listenersStarted = true;
      setupListeners();
      switchView("dashboard");
    }
  } else {
    loginScreenEl.style.display = "flex";
    authUserLabelEl.textContent = "";
    logoutBtnEl.style.display = "none";
    loginFormEl.reset();
  }
});

/* =========================================================================
   Firestore 보안 규칙 (Firebase 콘솔 > Firestore Database > 규칙)
   -------------------------------------------------------------------------
   이제 위에서 로그인 기능을 구현했으므로, 아래 규칙을 그대로 적용하면
   "로그인한 사용자만 읽기/쓰기 가능"하게 안전하게 동작합니다.
   (로그인 기능이 없는 상태에서 이 규칙만 적용하면 모든 요청이
    permission-denied 오류로 막히니 반드시 로그인 기능과 함께 적용하세요.)

   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {
       match /{document=**} {
         allow read, write: if request.auth != null;
       }
     }
   }
   ========================================================================= */
