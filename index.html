<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>채용관리시스템 (ATS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #0B1426;
  --navy-mid:    #0F1E35;
  --indigo:      #1E3A5F;
  --brand:       #2563EB;
  --brand-light: #3B82F6;
  --brand-dim:   #1D4ED8;
  --cyan:        #0EA5E9;
  --emerald:     #059669;
  --amber:       #D97706;
  --rose:        #E11D48;
  --violet:      #7C3AED;
  --teal:        #0D9488;
  --slate-50:    #F8FAFC;
  --slate-100:   #F1F5F9;
  --slate-200:   #E2E8F0;
  --slate-300:   #CBD5E1;
  --slate-400:   #94A3B8;
  --slate-500:   #64748B;
  --slate-600:   #475569;
  --slate-700:   #334155;
  --slate-800:   #1E293B;
  --slate-900:   #0F172A;
  --white:       #FFFFFF;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   16px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 12px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:   0 10px 30px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  --sidebar-w:   260px;
  --header-h:    64px;
  --font-base:   'Inter','Noto Sans KR',system-ui,sans-serif;
  --transition:  0.18s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--slate-50);
  font-family: var(--font-base);
  font-size: 14px;
  color: var(--slate-700);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 99px; }

/* LOGIN */
.login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--navy) 0%, var(--indigo) 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 2000; padding: 20px;
}
.login-screen::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 70% 30%, rgba(37,99,235,.18) 0%, transparent 70%);
  pointer-events: none;
}
.login-box {
  background: var(--white); border-radius: var(--radius-lg);
  padding: 40px 36px; width: 400px; max-width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,.35); position: relative;
}
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.login-logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--brand), var(--cyan));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.login-logo-text { font-size: 15px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.3px; }
.login-logo-sub  { font-size: 11px; color: var(--slate-400); font-weight: 400; margin-top: 1px; }
.login-box h2    { font-size: 22px; font-weight: 700; color: var(--slate-900); margin-bottom: 4px; letter-spacing: -0.4px; }
.login-box p     { font-size: 13px; color: var(--slate-500); margin-bottom: 24px; }
.login-error {
  color: var(--rose); font-size: 12px; margin-top: 10px;
  background: rgba(225,29,72,.06); border-radius: var(--radius-sm);
  padding: 8px 10px; display: none;
}

/* HEADER */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h); background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px 0 16px; z-index: 900;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.header-left  { display: flex; align-items: center; gap: 12px; }
.header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.header-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--brand), var(--cyan));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.header-title    { font-size: 15px; font-weight: 700; color: var(--white); letter-spacing: -0.3px; line-height: 1.2; white-space: nowrap; }
.header-subtitle { font-size: 10px; color: rgba(255,255,255,.4); font-weight: 400; }
.header-right    { display: flex; align-items: center; gap: 10px; }
.header-user     { font-size: 12px; color: rgba(255,255,255,.55); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.menu-toggle {
  display: none; background: none; border: none; color: rgba(255,255,255,.7);
  font-size: 20px; cursor: pointer; padding: 6px; border-radius: var(--radius-sm);
  transition: background var(--transition);
}
.menu-toggle:hover { background: rgba(255,255,255,.1); }

/* LAYOUT */
.layout { display: flex; padding-top: var(--header-h); min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); background: var(--navy-mid); flex-shrink: 0;
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  overflow-y: auto; border-right: 1px solid rgba(255,255,255,.05);
  z-index: 800; display: flex; flex-direction: column;
  transition: transform var(--transition);
}
.sidebar-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
  color: rgba(255,255,255,.3); text-transform: uppercase;
  padding: 20px 18px 8px;
}
.sidebar-nav { list-style: none; padding: 0 10px; }
.sidebar-nav li { margin-bottom: 2px; }
.sidebar-nav li a {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; border-radius: var(--radius-md);
  color: rgba(255,255,255,.55); text-decoration: none;
  font-size: 13.5px; font-weight: 500; cursor: pointer;
  transition: all var(--transition); position: relative;
}
.sidebar-nav li a:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.9); }
.sidebar-nav li a.active {
  background: linear-gradient(90deg, rgba(37,99,235,.35), rgba(37,99,235,.15));
  color: var(--white); box-shadow: inset 3px 0 0 var(--brand);
}
.sidebar-nav li a .nav-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.sidebar-nav li a .nav-badge {
  margin-left: auto; background: var(--brand); color: var(--white);
  font-size: 10px; font-weight: 700; border-radius: 99px;
  padding: 1px 7px; min-width: 20px; text-align: center;
}
.sidebar-footer { margin-top: auto; padding: 16px 18px; border-top: 1px solid rgba(255,255,255,.06); font-size: 11px; color: rgba(255,255,255,.25); }
.sidebar-backdrop {
  display: none; position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 790; backdrop-filter: blur(2px);
}

/* CONTENT */
.content { flex: 1; margin-left: var(--sidebar-w); padding: 28px 28px 40px; min-width: 0; min-height: calc(100vh - var(--header-h)); }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.page-title   { font-size: 22px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.5px; line-height: 1.2; }
.page-subtitle { font-size: 12px; color: var(--slate-400); margin-top: 4px; font-weight: 400; }

/* STAT CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--white); border-radius: var(--radius-lg);
  padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--slate-200);
  position: relative; overflow: hidden; transition: transform var(--transition), box-shadow var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.stat-card:nth-child(1)::before { background: var(--brand); }
.stat-card:nth-child(2)::before { background: var(--cyan); }
.stat-card:nth-child(3)::before { background: var(--violet); }
.stat-card:nth-child(4)::before { background: var(--emerald); }
.stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--slate-400); text-transform: uppercase; }
.stat-value { font-size: 36px; font-weight: 700; color: var(--slate-900); line-height: 1.1; margin-top: 8px; letter-spacing: -1px; }
.stat-icon  { position: absolute; right: 16px; top: 16px; font-size: 28px; opacity: .12; }

/* PANEL */
.panel { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--slate-200); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 20px; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--slate-100); flex-wrap: wrap; gap: 12px; }
.panel-title  { font-size: 15px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.3px; }
.panel-body   { padding: 0; overflow-x: auto; }
.panel-inner  { padding: 20px 22px; }

/* TOOLBAR / FILTER */
.toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.filter-row { padding: 14px 22px; border-bottom: 1px solid var(--slate-100); display: flex; gap: 10px; flex-wrap: wrap; }
.filter-input {
  flex: 1; min-width: 200px; padding: 8px 12px;
  border: 1px solid var(--slate-200); border-radius: var(--radius-md);
  font-size: 13px; font-family: var(--font-base);
  background: var(--slate-50); color: var(--slate-700);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.filter-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.12); background: var(--white); }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border: none; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 600; font-family: var(--font-base);
  cursor: pointer; transition: all var(--transition); white-space: nowrap; line-height: 1;
}
.btn-primary   { background: var(--brand); color: var(--white); box-shadow: 0 1px 4px rgba(37,99,235,.3); }
.btn-primary:hover { background: var(--brand-dim); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.35); }
.btn-secondary { background: var(--slate-100); color: var(--slate-600); border: 1px solid var(--slate-200); }
.btn-secondary:hover { background: var(--slate-200); color: var(--slate-800); }
.btn-danger    { background: rgba(225,29,72,.1); color: var(--rose); border: 1px solid rgba(225,29,72,.2); }
.btn-danger:hover  { background: var(--rose); color: var(--white); }
.btn-success   { background: rgba(5,150,105,.1); color: var(--emerald); border: 1px solid rgba(5,150,105,.2); }
.btn-success:hover { background: var(--emerald); color: var(--white); }
.btn-ghost     { background: transparent; color: var(--slate-500); border: 1px solid var(--slate-200); }
.btn-ghost:hover   { background: var(--slate-100); }
.btn-sm  { padding: 6px 11px; font-size: 12px; border-radius: var(--radius-sm); }
.btn-xs  { padding: 4px 8px; font-size: 11px; border-radius: 4px; }
.btn-icon { padding: 7px; border-radius: var(--radius-sm); background: var(--slate-100); color: var(--slate-500); border: none; cursor: pointer; font-size: 14px; transition: all var(--transition); }
.btn-icon:hover { background: var(--slate-200); color: var(--slate-700); }

/* TABLE */
table { width: 100%; border-collapse: collapse; min-width: 500px; }
thead tr { background: var(--slate-50); }
th { padding: 11px 14px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--slate-400); text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--slate-200); white-space: nowrap; }
td { padding: 13px 14px; font-size: 13px; color: var(--slate-600); border-bottom: 1px solid var(--slate-100); vertical-align: middle; }
tbody tr { transition: background var(--transition); }
tbody tr:hover { background: var(--slate-50); }
tbody tr:last-child td { border-bottom: none; }
td.center { text-align: center; }
td.actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.cell-name { font-weight: 600; color: var(--slate-800); }
.cell-sub  { font-size: 11px; color: var(--slate-400); margin-top: 2px; }
.empty-row td { text-align: center; padding: 44px 14px; color: var(--slate-400); font-size: 13px; }
.empty-icon   { font-size: 32px; display: block; margin-bottom: 10px; opacity: .4; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; white-space: nowrap; }
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .7; flex-shrink: 0; }
.badge-scheduled { background: rgba(124,58,237,.12); color: var(--violet); }
.badge-done      { background: rgba(99,102,241,.12); color: #4F46E5; }
.badge-passed    { background: rgba(5,150,105,.12); color: var(--emerald); }
.badge-failed    { background: rgba(225,29,72,.1); color: var(--rose); }
.badge-active    { background: rgba(37,99,235,.12); color: var(--brand); }
.badge-closed    { background: rgba(100,116,139,.1); color: var(--slate-500); }
.badge-eval      { background: rgba(13,148,136,.12); color: var(--teal); }
.badge-contract  { background: rgba(5,150,105,.12); color: var(--emerald); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px; backdrop-filter: blur(3px);
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--white); border-radius: var(--radius-lg);
  width: 500px; max-width: 100%; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); animation: slideUp .2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.modal-head { padding: 22px 24px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 17px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.4px; }
.modal-close { background: none; border: none; color: var(--slate-400); font-size: 18px; cursor: pointer; padding: 4px; border-radius: var(--radius-sm); transition: all var(--transition); }
.modal-close:hover { background: var(--slate-100); color: var(--slate-700); }
.modal-body   { padding: 0 24px; }
.modal-footer { padding: 20px 24px 24px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--slate-100); margin-top: 20px; }

/* FORM */
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; color: var(--slate-600); text-transform: uppercase; }
.form-control { width: 100%; padding: 9px 12px; border: 1px solid var(--slate-200); border-radius: var(--radius-md); font-size: 14px; font-family: var(--font-base); color: var(--slate-800); background: var(--white); transition: border-color var(--transition), box-shadow var(--transition); }
.form-control:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
.form-control[readonly] { background: var(--slate-50); color: var(--slate-500); }
.form-hint { font-size: 11px; color: var(--slate-400); margin-top: 5px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.resume-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(37,99,235,.07); border: 1px solid rgba(37,99,235,.2); border-radius: var(--radius-sm); padding: 7px 12px; margin-top: 8px; font-size: 12px; color: var(--brand); }
.resume-tag a { color: var(--brand); text-decoration: none; font-weight: 600; }
.resume-tag a:hover { text-decoration: underline; }

/* 평가서 */
.eval-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.eval-section { border: 1px solid var(--slate-200); border-radius: var(--radius-md); margin-bottom: 14px; overflow: hidden; }
.eval-section-header { background: var(--slate-50); padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--slate-200); }
.eval-section-num { width: 22px; height: 22px; background: var(--brand); color: var(--white); border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.eval-section-title { font-size: 13px; font-weight: 700; color: var(--slate-800); flex: 1; }
.eval-section-body  { padding: 14px; }
.eval-score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.eval-score-label { font-size: 12px; color: var(--slate-500); min-width: 60px; }
.score-btn-group  { display: flex; gap: 4px; flex-wrap: wrap; }
.score-btn { padding: 4px 10px; border-radius: 99px; border: 1.5px solid var(--slate-300); background: transparent; font-size: 12px; font-weight: 600; color: var(--slate-500); cursor: pointer; transition: all var(--transition); }
.score-btn:hover   { border-color: var(--brand); color: var(--brand); background: rgba(37,99,235,.06); }
.score-btn.selected { background: var(--brand); border-color: var(--brand); color: var(--white); }
.score-btn.A.selected { background: var(--emerald); border-color: var(--emerald); }
.score-btn.B.selected { background: var(--teal); border-color: var(--teal); }
.score-btn.C.selected { background: var(--amber); border-color: var(--amber); }
.score-btn.D.selected { background: var(--rose); border-color: var(--rose); }
.eval-add-btn { width: 100%; padding: 10px; border: 1.5px dashed var(--slate-300); background: transparent; border-radius: var(--radius-md); color: var(--slate-400); cursor: pointer; font-size: 13px; font-family: var(--font-base); transition: all var(--transition); margin-bottom: 14px; }
.eval-add-btn:hover { border-color: var(--brand); color: var(--brand); background: rgba(37,99,235,.04); }
.eval-preview-panel { background: var(--navy); border-radius: var(--radius-lg); padding: 22px; color: rgba(255,255,255,.85); font-size: 12.5px; line-height: 1.8; white-space: pre-wrap; min-height: 400px; font-family: 'Noto Sans KR', monospace; position: sticky; top: 20px; overflow-x: hidden; }
.eval-preview-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: rgba(255,255,255,.3); text-transform: uppercase; margin-bottom: 14px; }
.eval-preview-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.eval-candidate-info { display: flex; align-items: center; gap: 14px; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: var(--radius-md); padding: 14px 18px; margin-bottom: 22px; }
.eval-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, var(--brand), var(--cyan)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.eval-candidate-name { font-size: 16px; font-weight: 700; color: var(--slate-900); }
.eval-candidate-meta { font-size: 12px; color: var(--slate-500); margin-top: 3px; }
.eval-summary-block { background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: var(--radius-md); padding: 14px; margin-bottom: 14px; }
.eval-summary-title { font-size: 12px; font-weight: 700; color: var(--slate-700); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.total-score-display { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: var(--radius-md); background: var(--white); border: 1px solid var(--slate-200); margin-bottom: 10px; }
.total-score-value { font-size: 28px; font-weight: 800; color: var(--brand); letter-spacing: -1px; }
.total-score-label { font-size: 12px; color: var(--slate-500); }
.rec-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.rec-btn { flex: 1; min-width: 80px; padding: 10px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--slate-300); background: transparent; font-size: 13px; font-weight: 700; cursor: pointer; transition: all var(--transition); color: var(--slate-500); font-family: var(--font-base); text-align: center; }
.rec-btn:hover { border-color: var(--brand); background: rgba(37,99,235,.05); color: var(--brand); }
.rec-btn.selected-pass   { background: var(--emerald); border-color: var(--emerald); color: var(--white); }
.rec-btn.selected-hold   { background: var(--amber); border-color: var(--amber); color: var(--white); }
.rec-btn.selected-reject { background: var(--rose); border-color: var(--rose); color: var(--white); }

/* NOTIFICATIONS */
.notif-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 14px 22px; border-bottom: 1px solid var(--slate-100); transition: background var(--transition); }
.notif-item:last-child { border-bottom: none; }
.notif-item.unread { background: rgba(37,99,235,.03); border-left: 3px solid var(--brand); }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); margin-top: 5px; flex-shrink: 0; }
.notif-text { font-size: 13px; color: var(--slate-700); }
.notif-time { font-size: 11px; color: var(--slate-400); margin-top: 3px; }

/* ════════════════════════════════════════════════════════════════════
   이력서 뷰어  v5.0  ―  PDF.js 캔버스 렌더링 기반 재설계

   ▸ 변경 배경 (모바일 흰 화면 버그 수정)
   기존 v4는 PDF를 <iframe src="blob:...">로 그대로 주입했습니다.
   이 방식은 "브라우저의 내장 PDF 플러그인"이 iframe 안에서 PDF를
   렌더링해 줄 때만 동작합니다. 데스크탑 Chrome/Edge/Firefox는 이런
   플러그인이 있지만, 모바일에서는 사실상 거의 항상 없습니다.
     - Android Chrome / 삼성인터넷 / WebView 계열: iframe 안에서
       PDF 뷰어가 활성화되지 않아 빈(흰) 페이지만 표시됨
     - iOS Safari: 일부 버전/환경에서 동일하게 빈 화면 발생
     - 카카오톡·네이버 등 인앱 브라우저(WKWebView): 거의 항상 실패
   → 결과적으로 "모바일에서는 이력서가 안 보이고 흰 화면만 나옴"

   ▸ 해결책
   PDF.js(Mozilla)를 이용해 PDF의 각 페이지를 직접 <canvas>에 그려서
   화면에 표시합니다. 이 방식은 브라우저의 PDF 뷰어 기능과 전혀
   무관하게 동작하므로, 안드로이드/아이폰/인앱브라우저 등 어떤
   환경에서도 동일하게 렌더링됩니다.
   PDF.js는 동적 import()로 필요할 때만 불러오며, 로드에 실패하면
   기존 iframe 방식으로 자동 폴백합니다(완전히 막히는 일은 없음).
   ════════════════════════════════════════════════════════════════════ */

/* ── 환경 감지 ── */
const ENV = (() => {
  const ua = navigator.userAgent;

  // iOS 판별 (iPad Pro는 MacIntel + maxTouchPoints로 구분)
  const isIOS =
    /iPhone|iPod/i.test(ua) ||
    /iPad/i.test(ua) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  const isAndroid = /Android/i.test(ua);

  // iOS 메이저 버전 (Web Share Files API: iOS 15.0+)
  const iosVerMatch =
    ua.match(/OS (\d+)[_\d]+ like Mac OS/i) ||
    ua.match(/CPU iPhone OS (\d+)/i);
  const iosVersion = isIOS && iosVerMatch ? parseInt(iosVerMatch[1], 10) : 0;

  // WKWebView (카카오/네이버 인앱 브라우저)
  const isWKWebView =
    isIOS && (
      !/Safari/i.test(ua) ||                          // Safari 문자열 없음
      /KAKAO|NAVER|Line|Instagram|FB_IAB/i.test(ua) || // 알려진 인앱
      !!(window.webkit?.messageHandlers)               // 네이티브 브릿지
    );

  // Samsung Internet
  const isSamsung = /SamsungBrowser/i.test(ua);

  // 모바일 여부
  const isMobile = isIOS || isAndroid;

  // Web Share API 지원
  const hasWebShare = "share" in navigator;
  // Web Share Files 지원 (iOS15+ / Android Chrome 일부)
  const hasWebShareFiles = hasWebShare && "canShare" in navigator;

  return { isIOS, isAndroid, iosVersion, isWKWebView, isSamsung, isMobile, hasWebShare, hasWebShareFiles };
})();

/* ── PDF.js 동적 로더 (CDN, 실패해도 앱 전체에 영향 없음) ── */
const PDFJS_VERSION = "5.4.149";
const PDFJS_BASE = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VERSION}/`;
let _pdfjsLibPromise = null;
function loadPdfJs() {
  if (!_pdfjsLibPromise) {
    _pdfjsLibPromise = import(/* @vite-ignore */ PDFJS_BASE + "pdf.min.mjs")
      .then(mod => {
        mod.GlobalWorkerOptions.workerSrc = PDFJS_BASE + "pdf.worker.min.mjs";
        return mod;
      })
      .catch(err => { _pdfjsLibPromise = null; throw err; });
  }
  return _pdfjsLibPromise;
}

function dataUrlToBlob(dataUrl, fallbackMime = "application/octet-stream") {
  const commaIdx = dataUrl.indexOf(",");
  if (commaIdx === -1) throw new Error("잘못된 dataURL 형식입니다.");

  const header = dataUrl.slice(0, commaIdx);
  const b64    = dataUrl.slice(commaIdx + 1);
  const mime   = header.match(/:(.*?);/)?.[1] || fallbackMime;

  // ★ 청크 단위 디코딩 (기존 atob(전체) 방식은 수백KB에서 스택오버플로 유발)
  const CHUNK = 8192;
  const raw   = atob(b64);
  const len   = raw.length;
  const buffers = [];

  for (let i = 0; i < len; i += CHUNK) {
    const end  = Math.min(i + CHUNK, len);
    const view = new Uint8Array(end - i);
    for (let j = i; j < end; j++) view[j - i] = raw.charCodeAt(j);
    buffers.push(view);
  }

  return { blob: new Blob(buffers, { type: mime }), mime };
}

/* ── Blob URL 생성 + 자동 해제 ── */
function makeBlobUrl(blob, ttlMs = 180_000) {
  const url = URL.createObjectURL(blob);
  setTimeout(() => URL.revokeObjectURL(url), ttlMs);
  return url;
}

/* ── body 스크롤 잠금 / 해제 (iOS 완전 처리) ── */
let _scrollY = 0;
function lockBodyScroll() {
  _scrollY = window.scrollY;
  document.body.style.overflow   = "hidden";
  if (ENV.isIOS) {
    document.body.style.position = "fixed";
    document.body.style.top      = `-${_scrollY}px`;
    document.body.style.width    = "100%";
    document.body.style.left     = "0";
  }
}
function unlockBodyScroll() {
  document.body.style.overflow = "";
  if (ENV.isIOS) {
    document.body.style.position = "";
    document.body.style.top      = "";
    document.body.style.width    = "";
    document.body.style.left     = "";
    window.scrollTo({ top: _scrollY, behavior: "instant" });
  }
}

/* ── iOS Web Share: 파일 공유 ── */
async function shareFile(blob, mime, fileName) {
  if (!ENV.hasWebShare) return false;
  try {
    if (ENV.hasWebShareFiles) {
      const file = new File([blob], fileName, { type: mime });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: fileName });
        return true;
      }
    }
    // files 미지원이면 URL 공유로 폴백 (파일앱 저장은 불가하지만 UX 제공)
    const blobUrl = makeBlobUrl(blob, 30_000);
    await navigator.share({ url: blobUrl, title: fileName });
    return true;
  } catch (err) {
    if (err.name === "AbortError") return true; // 사용자 취소 = 정상
    console.warn("[WebShare] 실패:", err.name, err.message);
    return false;
  }
}

/* ── Android / PC: Blob URL a[download] ── */
function downloadBlob(blob, fileName) {
  const ttl = ENV.isSamsung ? 30_000 : 10_000;
  const url  = makeBlobUrl(blob, ttl);
  const a    = Object.assign(document.createElement("a"), {
    href: url, download: fileName || "resume", style: "display:none"
  });
  document.body.appendChild(a);
  a.click();
  requestAnimationFrame(() => { try { document.body.removeChild(a); } catch {} });
}

/* ── PC: 새 탭 미리보기 ── */
function openNewTab(blob, mime, fileName) {
  const blobUrl = makeBlobUrl(blob, 90_000);
  const w = window.open("", "_blank");
  if (!w) { downloadBlob(blob, fileName); return; }

  const safeTitle = fileName ? fileName.replace(/</g,"&lt;") : "이력서";

  if (mime === "application/pdf") {
    w.document.write(`<!DOCTYPE html><html lang="ko"><head>
      <meta charset="UTF-8"><title>${safeTitle}</title>
      <style>*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;background:#404040;}
      object{display:block;width:100%;height:100%;border:none;}</style></head><body>
      <object data="${blobUrl}" type="application/pdf">
        <p style="color:#fff;padding:24px;text-align:center;font-family:sans-serif;">
          PDF를 표시할 수 없습니다.
          <a href="${blobUrl}" download="${safeTitle}"
             style="color:#60A5FA;display:block;margin-top:12px;">다운로드</a>
        </p>
      </object></body></html>`);
  } else if (mime.startsWith("image/")) {
    w.document.write(`<!DOCTYPE html><html lang="ko"><head>
      <meta charset="UTF-8"><title>${safeTitle}</title>
      <style>*{margin:0;padding:0;}body{background:#1a1a1a;display:flex;align-items:center;
      justify-content:center;min-height:100vh;}
      img{max-width:98vw;max-height:98vh;object-fit:contain;
          box-shadow:0 4px 32px rgba(0,0,0,.7);}</style></head><body>
      <img src="${blobUrl}" alt="${safeTitle}"></body></html>`);
  } else {
    w.close();
    downloadBlob(blob, fileName);
    return;
  }
  w.document.close();
}

/* ════════════════════════════════════════════════════════
   인라인 뷰어 핵심 함수
   ════════════════════════════════════════════════════════ */
function openInlineViewer(blob, mime, fileName, rawDataUrl) {
  // 중복 방지
  document.getElementById("rv-overlay")?.remove();

  const isPdf = mime === "application/pdf";
  const isImg = mime.startsWith("image/");

  /* 저장 버튼 핸들러 */
  const handleSave = async () => {
    if (ENV.isIOS) {
      const ok = await shareFile(blob, mime, fileName);
      if (!ok) {
        alert("저장하려면:\n[공유 버튼] → [파일에 저장] 또는 [이미지 저장]을 선택하세요.\n\n저장이 안 되면 PC에서 다운로드해 주세요.");
      }
    } else {
      downloadBlob(blob, fileName);
    }
  };

  /* ── DOM 구성 ── */
  const overlay = document.createElement("div");
  overlay.id = "rv-overlay";
  overlay.setAttribute("role", "dialog");
  overlay.setAttribute("aria-modal", "true");
  overlay.setAttribute("aria-label", "이력서 뷰어");

  // 툴바
  overlay.innerHTML = `
    <div id="rv-toolbar">
      <span id="rv-filename">📎 ${fileName || "이력서"}</span>
      <div id="rv-btns">
        <button class="rv-btn rv-btn-save" id="rv-save-btn">
          ${ENV.isIOS ? "📤 저장" : "💾 저장"}
        </button>
        <button class="rv-btn rv-btn-close" id="rv-close-btn" aria-label="닫기">✕ 닫기</button>
      </div>
    </div>
    <div id="rv-body">
      <div id="rv-loading">
        <div class="rv-spinner"></div>
        <span>파일을 불러오는 중...</span>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  lockBodyScroll();

  const bodyEl   = overlay.querySelector("#rv-body");
  const loadingEl = overlay.querySelector("#rv-loading");

  /* ── 닫기 로직 ── */
  const closeViewer = () => {
    overlay.remove();
    unlockBodyScroll();
    document.removeEventListener("keydown", onKey);
  };
  const onKey = (e) => { if (e.key === "Escape") closeViewer(); };
  overlay.querySelector("#rv-close-btn").addEventListener("click", closeViewer);
  overlay.querySelector("#rv-save-btn").addEventListener("click", handleSave);
  document.addEventListener("keydown", onKey);

  /* ── 콘텐츠 렌더링 ── */
  if (isPdf) {
    _renderPdf(bodyEl, loadingEl, blob, mime, fileName, rawDataUrl);
  } else if (isImg) {
    _renderImage(bodyEl, loadingEl, blob, fileName);
  } else {
    _renderFallback(bodyEl, loadingEl, fileName, handleSave);
  }
}

/* PDF 렌더링 — PDF.js 우선, 실패 시 iframe 폴백 */
async function _renderPdf(bodyEl, loadingEl, blob, mime, fileName, rawDataUrl) {
  try {
    const pdfjsLib = await loadPdfJs();
    await _renderPdfWithPdfJs(bodyEl, loadingEl, blob, pdfjsLib);
    return;
  } catch (err) {
    console.warn("[PDF.js] 로드/렌더링 실패, iframe 방식으로 폴백:", err);
  }
  _renderPdfIframeFallback(bodyEl, loadingEl, blob, mime, fileName, rawDataUrl);
}

/* PDF.js로 각 페이지를 캔버스에 직접 그려서 표시
   (브라우저의 내장 PDF 플러그인에 의존하지 않으므로 모든 모바일
    브라우저·인앱 웹뷰에서 동일하게 동작합니다) */
async function _renderPdfWithPdfJs(bodyEl, loadingEl, blob, pdfjsLib) {
  const arrayBuffer = await blob.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  const wrap = document.createElement("div");
  wrap.id = "rv-pdf-pages";
  bodyEl.appendChild(wrap);

  const outputScale  = window.devicePixelRatio || 1;
  const targetWidth  = Math.max(280, (bodyEl.clientWidth || window.innerWidth) - 20);

  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const baseViewport = page.getViewport({ scale: 1 });
    const scale = targetWidth / baseViewport.width;
    const viewport = page.getViewport({ scale });

    const canvas = document.createElement("canvas");
    canvas.width  = Math.floor(viewport.width * outputScale);
    canvas.height = Math.floor(viewport.height * outputScale);
    canvas.style.width  = Math.floor(viewport.width) + "px";
    canvas.style.height = Math.floor(viewport.height) + "px";
    wrap.appendChild(canvas);

    const ctx = canvas.getContext("2d");
    const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;
    await page.render({ canvasContext: ctx, viewport, transform }).promise;

    if (pageNum === 1) loadingEl.style.display = "none";
  }

  if (pdf.numPages === 0) loadingEl.style.display = "none";
}

/* 기존 iframe 방식 (PDF.js 로드/렌더링 실패 시에만 사용하는 최후 폴백) */
function _renderPdfIframeFallback(bodyEl, loadingEl, blob, mime, fileName, rawDataUrl) {
  const useGoogleProxy = ENV.isIOS && (ENV.iosVersion > 0 && ENV.iosVersion < 15);
  const useDirectBlob  = !useGoogleProxy; // iOS15+, Android, PC 모두

  if (useDirectBlob) {
    // ── Blob URL iframe ──
    const blobUrl = makeBlobUrl(blob, 300_000); // 5분
    const iframe = document.createElement("iframe");
    iframe.id    = "rv-pdf-frame";
    iframe.title = fileName || "이력서";
    iframe.setAttribute("allowfullscreen", "");
    // iOS: allow-same-origin 없이 sandbox 지정 시 PDF 렌더링 차단됨 → sandbox 없이 사용
    iframe.src = blobUrl;

    let loaded = false;
    iframe.addEventListener("load", () => {
      loaded = true;
      loadingEl.style.display = "none";
    });

    // 5초 후에도 load 이벤트가 안 오면 (일부 iOS에서 발생) 스피너만 제거
    setTimeout(() => {
      if (!loaded) loadingEl.style.display = "none";
    }, 5000);

    bodyEl.appendChild(iframe);

  } else {
    // ── iOS 14 이하: base64 data URI를 새 HTML로 감싸서 iframe에 주입 ──
    const pdfDataUrl = rawDataUrl || "";
    const srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
      <style>*{margin:0;padding:0;}html,body{width:100%;height:100%;overflow:hidden;}
      object,embed{display:block;width:100%;height:100%;border:none;}
      </style></head><body>
      <object data="${pdfDataUrl}" type="application/pdf">
        <embed src="${pdfDataUrl}" type="application/pdf">
      </object>
      </body></html>`;

    const iframe = document.createElement("iframe");
    iframe.id    = "rv-pdf-frame";
    iframe.title = fileName || "이력서";
    iframe.setAttribute("sandbox", "allow-scripts allow-same-origin");
    iframe.srcdoc = srcdoc;

    iframe.addEventListener("load", () => {
      loadingEl.style.display = "none";
    });
    setTimeout(() => { loadingEl.style.display = "none"; }, 4000);

    bodyEl.appendChild(iframe);
  }
}

/* 이미지 렌더링 */
function _renderImage(bodyEl, loadingEl, blob, fileName) {
  const blobUrl = makeBlobUrl(blob, 300_000);

  const wrap = document.createElement("div");
  wrap.id = "rv-img-wrap";

  const img = document.createElement("img");
  img.alt = fileName || "이력서 이미지";
  img.src = blobUrl;

  img.addEventListener("load", () => {
    loadingEl.style.display = "none";
  });

  img.addEventListener("error", () => {
    loadingEl.style.display = "none";
    wrap.innerHTML = `
      <div style="text-align:center;color:rgba(255,255,255,.6);padding:32px;">
        <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
        <div style="font-size:14px;">이미지를 불러올 수 없습니다.</div>
        <div style="font-size:12px;margin-top:6px;opacity:.6;">${fileName || ""}</div>
      </div>`;
  });

  wrap.appendChild(img);
  bodyEl.appendChild(wrap);
}

/* 열람 불가 파일 (DOC/DOCX 등) */
function _renderFallback(bodyEl, loadingEl, fileName, handleSave) {
  loadingEl.style.display = "none";

  const div = document.createElement("div");
  div.id = "rv-fallback";
  div.innerHTML = `

      아래 버튼으로 기기에 저장 후 확인해 주세요.

  bodyEl.appendChild(div);
}

/* ════════════════════════════════════════════
   진입점: viewResume(id)
   ════════════════════════════════════════════ */
function viewResume(id) {
  const applicant = applicantsCache.find(x => x.id === id);
  if (!applicant?.resume?.dataUrl) {
    alert("첨부된 이력서가 없습니다.");
    return;
  }

  const { dataUrl, mimeType, fileName } = applicant.resume;

  // MIME 타입 보정: 파일명 확장자로도 추론
  const resolvedMime = (() => {
    if (mimeType && mimeType !== "application/octet-stream") return mimeType;
    const ext = (fileName || "").split(".").pop().toLowerCase();
    const map = {
      pdf:"application/pdf", jpg:"image/jpeg", jpeg:"image/jpeg",
      png:"image/png", gif:"image/gif", webp:"image/webp",
      doc:"application/msword",
      docx:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    };
    return map[ext] || mimeType || "application/octet-stream";
  })();

  let blob, mime;
  try {
    ({ blob, mime } = dataUrlToBlob(dataUrl, resolvedMime));
  } catch (err) {
    console.error("[viewResume] 변환 실패:", err);
    alert("파일 변환 오류: " + err.message);
    return;
  }

  // PC: 새 탭 / 모바일: 인라인 뷰어
  if (!ENV.isMobile) {
    openNewTab(blob, mime, fileName);
  } else {
    openInlineViewer(blob, mime, fileName, dataUrl);
  }
}

    <div><div class="page-title">면접 관리</div><div class="page-subtitle">총 ${applicantsCache.length}명 · 면접예정 ${applicantsCache.filter(a=>a.status==="면접예정").length}명</div></div>

  </div>

      <input class="filter-input" type="text" id="interviewSearch" placeholder="🔍  성명 · 직무 · 연락처 검색" value="${esc(interviewSearch)}">
    </div>

    if(re){ re.focus(); re.selectionStart=re.selectionEnd=re.value.length; }

function initEvalDraft(applicant){
  const ex=applicant&&applicant.evaluation;
  if(ex&&ex.competencies&&ex.competencies.length){
    evalDraft={
      competencies:ex.competencies.map(c=>({id:uid(),title:c.title||"",items:c.items||"",score:c.score||"",comment:c.comment||""})),
      personality:ex.personality||"", strengths:ex.strengths||"", risks:ex.risks||"",
      comment:ex.comment||"", recommendation:ex.recommendation||"",
      interviewerName:ex.interviewerName||"", interviewerTitle:ex.interviewerTitle||""
    };
  } else {
    evalDraft={
      competencies:DEFAULT_COMPETENCIES.map(c=>({id:uid(),title:c.title,items:"",score:"",comment:""})),
      personality:"", strengths:"", risks:"", comment:"", recommendation:"",
      interviewerName:"", interviewerTitle:""
    };
  }
}
function openEvaluationView(id){ evaluationId=id; const a=applicantsCache.find(x=>x.id===id); initEvalDraft(a); currentView="evaluationForm"; rerender(); }

function calcTotalScore(draft){
  const scored=draft.competencies.filter(c=>c.score);
  if(!scored.length)return{total:0,avg:"-",grade:"-"};
  const sum=scored.reduce((acc,c)=>acc+(SCORE_POINT[c.score]||0),0);
  const avg=(sum/scored.length).toFixed(1);
  let grade="-";
  if(avg>=3.5)grade="A(우수)"; else if(avg>=2.5)grade="B(양호)"; else if(avg>=1.5)grade="C(보통)"; else grade="D(미흡)";
  return{total:sum,avg,grade};
}

function buildReport(applicant, draft){
  const lines=[];
  const company=settingsCache.companyName||"";
  const dt=[applicant.interviewDate,applicant.interviewTime].filter(Boolean).join(" ");
  lines.push(`${"═".repeat(38)}`);
  lines.push(`  면  접  평  가  서${company?" ("+company+")":""}`);
  lines.push(`${"═".repeat(38)}`);
  lines.push(`지원자   : ${applicant.name||"-"}`);
  lines.push(`지원직무 : ${applicant.jobTitle||"-"}`);
  lines.push(`면접일시 : ${dt||"-"}`);
  if(draft.interviewerName) lines.push(`면접관   : ${draft.interviewerName}${draft.interviewerTitle?" ("+draft.interviewerTitle+")":""}`);
  lines.push(`${"─".repeat(38)}`);
  const filledComps = draft.competencies.filter(c=>c.title.trim()||(c.items&&c.items.trim())||c.score||c.comment);
  if(filledComps.length){
    lines.push(`[역량 평가]`);
    filledComps.forEach((c,i)=>{
      const scoreLabel=c.score?` ▶ ${c.score}`:"";
      lines.push(``);
      lines.push(`${i+1}. ${c.title||"역량 항목"}${scoreLabel}`);
      if(c.items&&c.items.trim()){
        c.items.split("\n").map(s=>s.trim()).filter(Boolean).forEach((s,j)=>{
          const CIRC=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
          lines.push(`   ${CIRC[j]||(j+1)+"."} ${s}`);
        });
      }
      if(c.comment&&c.comment.trim()) lines.push(`   → ${c.comment.trim()}`);
    });
    const {avg,grade}=calcTotalScore(draft);
    if(avg!=="-") lines.push(`\n   ※ 종합 평균: ${avg}점 / 종합 등급: ${grade}`);
    lines.push(`${"─".repeat(38)}`);
  }
  if(draft.personality&&draft.personality.trim()){
    lines.push(`[성격 및 업무 태도]`);
    draft.personality.split("\n").map(s=>s.trim()).filter(Boolean).forEach((s,j)=>{ const CIRC=["①","②","③","④","⑤"]; lines.push(`  ${CIRC[j]||(j+1)+"."} ${s}`); });
    lines.push(`${"─".repeat(38)}`);
  }
  if(draft.strengths&&draft.strengths.trim()){
    lines.push(`[주요 강점]`);
    draft.strengths.split("\n").map(s=>s.trim()).filter(Boolean).forEach((s,j)=>{ const CIRC=["①","②","③","④","⑤"]; lines.push(`  ${CIRC[j]||(j+1)+"."} ${s}`); });
    lines.push(`${"─".repeat(38)}`);
  }
  if(draft.risks&&draft.risks.trim()){
    lines.push(`[단점 및 채용 리스크]`);
    draft.risks.split("\n").map(s=>s.trim()).filter(Boolean).forEach((s,j)=>{ const CIRC=["①","②","③","④","⑤"]; lines.push(`  ${CIRC[j]||(j+1)+"."} ${s}`); });
    lines.push(`${"─".repeat(38)}`);
  }
  if(draft.comment&&draft.comment.trim()){
    lines.push(`[종합 의견]`);
    lines.push(`  ${draft.comment.trim()}`);
    lines.push(`${"─".repeat(38)}`);
  }
  if(draft.recommendation){
    const recEmoji=draft.recommendation==="채용추천"?"✅":draft.recommendation==="보류"?"🔶":"❌";
    lines.push(`[채용 추천 여부]  ${recEmoji} ${draft.recommendation}`);
    lines.push(`${"─".repeat(38)}`);
  }
  lines.push(`작성일: ${new Date().toLocaleDateString("ko-KR")}`);
  if(draft.interviewerName) lines.push(`면접관: ${draft.interviewerName}  (서명: ____________)`);
  return lines.join("\n");
}

function syncDraft(){
  if(!evalDraft)return;
  evalDraft.competencies.forEach(c=>{
    const t=document.querySelector(`[data-comp-title="${c.id}"]`); if(t)c.title=t.value;
    const i=document.querySelector(`[data-comp-items="${c.id}"]`); if(i)c.items=i.value;
    const cm=document.querySelector(`[data-comp-comment="${c.id}"]`); if(cm)c.comment=cm.value;
  });
  const p=document.getElementById("evalPersonality");   if(p)evalDraft.personality=p.value;
  const s=document.getElementById("evalStrengths");     if(s)evalDraft.strengths=s.value;
  const r=document.getElementById("evalRisks");         if(r)evalDraft.risks=r.value;
  const co=document.getElementById("evalComment");      if(co)evalDraft.comment=co.value;
  const n=document.getElementById("evalInterviewerName"); if(n)evalDraft.interviewerName=n.value;
  const ti=document.getElementById("evalInterviewerTitle"); if(ti)evalDraft.interviewerTitle=ti.value;
}

function updateEvalPreview(){
  const a=applicantsCache.find(x=>x.id===evaluationId);
  const el=document.getElementById("evalPreview");
  if(!a||!el||!evalDraft)return;
  el.textContent=buildReport(a,evalDraft);
  const sv=document.getElementById("totalScoreVal");
  if(sv){ const {avg}=calcTotalScore(evalDraft); sv.textContent=avg!=="-"?avg:"—"; }
}

function addCompBlock(){ syncDraft(); evalDraft.competencies.push({id:uid(),title:"",items:"",score:"",comment:""}); renderEvaluationForm(); }
function removeCompBlock(id){ syncDraft(); if(evalDraft.competencies.length<=1){alert("최소 1개는 남아야 합니다.");return;} evalDraft.competencies=evalDraft.competencies.filter(c=>c.id!==id); renderEvaluationForm(); }

function setScore(compId,score){
  syncDraft();
  const c=evalDraft.competencies.find(x=>x.id===compId);
  if(c){ c.score=c.score===score?"":score; }
  updateEvalPreview();
  document.querySelectorAll(`[data-action="set-score"][data-id="${compId}"]`).forEach(btn=>{
    btn.classList.toggle("selected", btn.dataset.score===c.score);
  });
  const sv=document.getElementById("totalScoreVal");
  if(sv){ const {avg}=calcTotalScore(evalDraft); sv.textContent=avg!=="-"?avg:"—"; }
}
function setRec(rec){
  syncDraft();
  evalDraft.recommendation=evalDraft.recommendation===rec?"":rec;
  updateEvalPreview();
  document.querySelectorAll(`[data-action="set-rec"]`).forEach(btn=>{
    btn.className="rec-btn";
    if(btn.dataset.rec===evalDraft.recommendation){
      if(rec==="채용추천")btn.classList.add("selected-pass");
      else if(rec==="보류")btn.classList.add("selected-hold");
      else if(rec==="비추천")btn.classList.add("selected-reject");
    }
  });
}

async function saveEvaluation(){
  syncDraft();
  const a=applicantsCache.find(x=>x.id===evaluationId);
  if(!a)return;
  const reportText=buildReport(a,evalDraft);
  try{
    await updateDoc(doc(db,"applicants",a.id),{evaluation:{
      competencies:evalDraft.competencies.map(c=>({title:c.title,items:c.items,score:c.score,comment:c.comment})),
      personality:evalDraft.personality, strengths:evalDraft.strengths, risks:evalDraft.risks,
      comment:evalDraft.comment, recommendation:evalDraft.recommendation,
      interviewerName:evalDraft.interviewerName, interviewerTitle:evalDraft.interviewerTitle,
      reportText, updatedAt:serverTimestamp()
    }});
    if(settingsCache.autoNotify!==false) notify(`${a.name}님의 면접 평가서가 저장되었습니다.`,"evaluation");
    alert("평가서가 저장되었습니다.");
  }catch(err){ alert("저장 오류: "+err.message); }
}

async function copyEvaluation(){
  syncDraft();
  const a=applicantsCache.find(x=>x.id===evaluationId); if(!a)return;
  try{ await navigator.clipboard.writeText(buildReport(a,evalDraft)); alert("클립보드에 복사되었습니다."); }
  catch(e){ alert("자동 복사 실패. 미리보기 영역을 직접 선택해 복사해주세요."); }
}

      <div class="settings-grid">
        <div class="form-group"><label>회사명</label><input class="form-control" name="companyName" value="${esc(s.companyName||"")}" placeholder="주식회사 예시"></div>
        <div class="form-group"><label>알림 수신 이메일</label><input class="form-control" type="email" name="notifyEmail" value="${esc(s.notifyEmail||"")}" placeholder="hr@company.com"></div>
      </div>
      <div class="settings-divider"></div>
      <div class="toggle-row">
        <div><div class="toggle-label">상태 변경 시 자동 알림 생성</div><div class="toggle-desc">합격·불합격·등록 등 상태가 바뀔 때 알림 항목을 자동으로 만듭니다</div></div>
        <label class="switch"><input type="checkbox" name="autoNotify" ${s.autoNotify!==false?"checked":""}><span class="slider"></span></label>
      </div>
      <div style="margin-top:20px;"><button type="submit" class="btn btn-primary">설정 저장</button></div>
    </form></div>
  </div>
  <div class="panel">
    <div class="panel-header"><span class="panel-title">운영자 관리</span><button class="btn btn-primary btn-sm" data-action="open-admin-modal">+ 운영자 추가</button></div>
    <div class="panel-body"><table>
      <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>관리</th></tr></thead>
      <tbody>${adminRows}</tbody>
    </table></div>
    <div class="panel-inner" style="padding-top:12px;"><p style="font-size:11px;color:var(--slate-400);">※ 실제 로그인·권한 분리는 Firebase Authentication 콘솔에서 계정을 관리하세요.</p></div>
  </div>`;
  document.getElementById("settingsForm").addEventListener("submit",async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const data={companyName:fd.get("companyName").trim(),notifyEmail:fd.get("notifyEmail").trim(),autoNotify:fd.get("autoNotify")==="on"};
    try{ await setDoc(settingsDocRef,data); alert("설정이 저장되었습니다."); }catch(err){ alert("저장 오류: "+err.message); }
  });
}
function openAdminModal(){
  showModal(`
  <div class="modal-head"><span class="modal-title">운영자 추가</span><button class="modal-close" data-action="close-modal">✕</button></div>
  <div class="modal-body"><form id="adminForm">
    <div class="form-group"><label>이름 *</label><input class="form-control" name="name" required></div>
    <div class="form-group"><label>이메일 *</label><input class="form-control" type="email" name="email" required></div>
    <div class="form-group"><label>역할</label><input class="form-control" name="role" placeholder="예: 인사담당자"></div>
    <div class="modal-footer" style="padding:0;border:none;margin-top:4px;">
      <button type="button" class="btn btn-secondary" data-action="close-modal">취소</button>
      <button type="submit" class="btn btn-primary">추가</button>
    </div>
  </form></div>`);
  document.getElementById("adminForm").addEventListener("submit",async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    try{ await addDoc(colAdmins,{name:fd.get("name").trim(),email:fd.get("email").trim(),role:fd.get("role").trim()}); closeModal(); }
    catch(err){ alert("저장 오류: "+err.message); }
  });
}
async function removeAdmin(id){ if(!confirm("삭제하시겠습니까?"))return; try{ await deleteDoc(doc(db,"admins",id)); }catch(err){ alert("삭제 오류: "+err.message); } }

/* 이벤트 위임 */
contentEl.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]"); if(!el)return;
  const action=el.dataset.action, id=el.dataset.id;
  switch(action){
    case"go-interviews":        switchView("interviews"); break;
    case"open-job-modal":       openJobModal(); break;
    case"edit-job":             openJobModal(id); break;
    case"remove-job":           removeJob(id); break;
    case"open-applicant-modal": openApplicantModal(); break;
    case"edit-applicant":       openApplicantModal(id); break;
    case"remove-applicant":     removeApplicant(id); break;
    case"view-resume":          viewResume(id); break;
    case"interview-done":       updateStatus(id,"면접완료"); break;
    case"interview-pass":       updateStatus(id,"최종합격"); break;
    case"interview-fail":       updateStatus(id,"불합격"); break;
    case"register-contract":    openContractSimpleModal(id); break;
    case"mark-notif-read":      markRead(id); break;
    case"delete-notif":         deleteNotif(id); break;
    case"open-admin-modal":     openAdminModal(); break;
    case"remove-admin":         removeAdmin(id); break;
    case"open-evaluation":      openEvaluationView(id); break;
    case"back-to-interviews":   evaluationId=null; evalDraft=null; switchView("interviews"); break;
    case"add-comp-block":       addCompBlock(); break;
    case"remove-comp-block":    removeCompBlock(id); break;
    case"set-score":            setScore(id, el.dataset.score); break;
    case"set-rec":              setRec(el.dataset.rec); break;
    case"save-evaluation":      saveEvaluation(); break;
    case"copy-evaluation":      copyEvaluation(); break;
    case"print-evaluation":     printEvaluation(); break;
    case"close-modal":          closeModal(); break;
  }
});

/* 사이드바 */
const sidebarEl=document.getElementById("sidebar");
const backdropEl=document.getElementById("sidebarBackdrop");
const menuToggleEl=document.getElementById("menuToggle");
function toggleSidebar(open){ const will=open!==undefined?open:!sidebarEl.classList.contains("open"); sidebarEl.classList.toggle("open",will); backdropEl.classList.toggle("show",will); }
menuToggleEl.addEventListener("click",()=>toggleSidebar());
backdropEl.addEventListener("click",()=>toggleSidebar(false));
document.querySelectorAll(".sidebar-nav a[data-view]").forEach(el=>{ el.addEventListener("click",()=>{ switchView(el.dataset.view); toggleSidebar(false); }); });

/* Firestore 리스너 */
function setupListeners(){
  onSnapshot(colJobs,         snap=>{ jobsCache=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.())||0-(a.createdAt?.toMillis?.())||0); rerender(); },e=>console.error(e));
  onSnapshot(colApplicants,   snap=>{ applicantsCache=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.())||0-(a.createdAt?.toMillis?.())||0); rerender(); },e=>console.error(e));
  onSnapshot(colNotifications,snap=>{ notificationsCache=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.())||0-(a.createdAt?.toMillis?.())||0); rerender(); },e=>console.error(e));
  onSnapshot(colAdmins,       snap=>{ adminsCache=snap.docs.map(d=>({id:d.id,...d.data()})); rerender(); },e=>console.error(e));
  onSnapshot(settingsDocRef,  snap=>{ settingsCache=snap.exists()?snap.data():{}; rerender(); },e=>console.error(e));
}

/* 로그인 */
const loginScreenEl=document.getElementById("loginScreen");
const loginFormEl=document.getElementById("loginForm");
const loginErrorEl=document.getElementById("loginError");
const authLabelEl=document.getElementById("authUserLabel");
const logoutBtnEl=document.getElementById("logoutBtn");
let listenersStarted=false;

loginFormEl.addEventListener("submit",async e=>{
  e.preventDefault(); loginErrorEl.style.display="none";
  const fd=new FormData(e.target);
  try{ await signInWithEmailAndPassword(auth,fd.get("email").trim(),fd.get("password")); }
  catch(err){ loginErrorEl.style.display="block"; }
});
logoutBtnEl.addEventListener("click",()=>signOut(auth));
onAuthStateChanged(auth,user=>{
  if(user){
    loginScreenEl.style.display="none";
    authLabelEl.textContent=user.email||"";
    logoutBtnEl.style.display="inline-flex";
    if(!listenersStarted){ listenersStarted=true; setupListeners(); switchView("dashboard"); }
  } else {
    loginScreenEl.style.display="flex";
    authLabelEl.textContent=""; logoutBtnEl.style.display="none";
    loginFormEl.reset(); loginErrorEl.style.display="none";
  }
});
</script>
</body>
</html>
