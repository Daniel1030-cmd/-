<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>채용관리시스템 (ATS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   - Palette: Deep Navy (#0B1426) / Indigo (#1E3A5F) / Electric Blue (#2563EB)
   - Accent: Cyan (#0EA5E9) / Emerald (#059669) / Amber (#D97706) / Rose (#E11D48)
   - Surface: Slate White (#F8FAFC) / Card (#FFFFFF)
   - Typography: Inter (data/UI) + Noto Sans KR (Korean)
   - Signature: Left-border accent cards + pill status badges + ghost sidebar nav
   ============================================================ */
:root {
  --navy:        #0B1426;
  --navy-mid:    #0F1E35;
  --indigo:      #1E3A5F;
  --brand:       #2563EB;
  --brand-light: #3B82F6;
  --brand-dim:   #1D4ED8;
  --cyan:        #0EA5E9;
  --emerald:     #059669;
  --amber:       #D97706;
  --rose:        #E11D48;
  --violet:      #7C3AED;
  --teal:        #0D9488;
  --slate-50:    #F8FAFC;
  --slate-100:   #F1F5F9;
  --slate-200:   #E2E8F0;
  --slate-300:   #CBD5E1;
  --slate-400:   #94A3B8;
  --slate-500:   #64748B;
  --slate-600:   #475569;
  --slate-700:   #334155;
  --slate-800:   #1E293B;
  --slate-900:   #0F172A;
  --white:       #FFFFFF;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   16px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 12px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:   0 10px 30px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  --sidebar-w:   260px;
  --header-h:    64px;
  --font-base:   'Inter','Noto Sans KR',system-ui,sans-serif;
  --transition:  0.18s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}
html { scroll-behavior: smooth; }
body {
  background: var(--slate-50);
  font-family: var(--font-base);
  font-size: 14px;
  color: var(--slate-700);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 99px; }

/* ========================================
   LOGIN SCREEN
   ======================================== */
.login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--navy) 0%, var(--indigo) 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 2000; padding: 20px;
}
.login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 70% 30%, rgba(37,99,235,.18) 0%, transparent 70%);
  pointer-events: none;
}
.login-box {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  width: 400px; max-width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,.35);
  position: relative;
}
.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
}
.login-logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--brand), var(--cyan));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.login-logo-text { font-size: 15px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.3px; }
.login-logo-sub  { font-size: 11px; color: var(--slate-400); font-weight: 400; margin-top: 1px; }
.login-box h2    { font-size: 22px; font-weight: 700; color: var(--slate-900); margin-bottom: 4px; letter-spacing: -0.4px; }
.login-box p     { font-size: 13px; color: var(--slate-500); margin-bottom: 24px; }
.login-error {
  color: var(--rose); font-size: 12px; margin-top: 10px;
  background: rgba(225,29,72,.06); border-radius: var(--radius-sm);
  padding: 8px 10px; display: none;
}

/* ========================================
   HEADER
   ======================================== */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px 0 16px;
  z-index: 900;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.header-left  { display: flex; align-items: center; gap: 12px; }
.header-brand {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.header-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--brand), var(--cyan));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.header-title {
  font-size: 15px; font-weight: 700; color: var(--white);
  letter-spacing: -0.3px; line-height: 1.2; white-space: nowrap;
}
.header-subtitle { font-size: 10px; color: rgba(255,255,255,.4); font-weight: 400; }
.header-right {
  display: flex; align-items: center; gap: 10px;
}
.header-user {
  font-size: 12px; color: rgba(255,255,255,.55);
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.menu-toggle {
  display: none;
  background: none; border: none; color: rgba(255,255,255,.7);
  font-size: 20px; cursor: pointer; padding: 6px;
  border-radius: var(--radius-sm);
  transition: background var(--transition);
}
.menu-toggle:hover { background: rgba(255,255,255,.1); }

/* ========================================
   LAYOUT
   ======================================== */
.layout {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ========================================
   SIDEBAR
   ======================================== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy-mid);
  flex-shrink: 0;
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,.05);
  z-index: 800;
  display: flex; flex-direction: column;
  transition: transform var(--transition);
}
.sidebar-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
  color: rgba(255,255,255,.3); text-transform: uppercase;
  padding: 20px 18px 8px;
}
.sidebar-nav { list-style: none; padding: 0 10px; }
.sidebar-nav li { margin-bottom: 2px; }
.sidebar-nav li a {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  color: rgba(255,255,255,.55);
  text-decoration: none; font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: all var(--transition);
  position: relative;
}
.sidebar-nav li a:hover {
  background: rgba(255,255,255,.07);
  color: rgba(255,255,255,.9);
}
.sidebar-nav li a.active {
  background: linear-gradient(90deg, rgba(37,99,235,.35), rgba(37,99,235,.15));
  color: var(--white);
  box-shadow: inset 3px 0 0 var(--brand);
}
.sidebar-nav li a .nav-icon {
  font-size: 16px; width: 22px; text-align: center; flex-shrink: 0;
}
.sidebar-nav li a .nav-badge {
  margin-left: auto;
  background: var(--brand); color: var(--white);
  font-size: 10px; font-weight: 700; border-radius: 99px;
  padding: 1px 7px; min-width: 20px; text-align: center;
}
.sidebar-footer {
  margin-top: auto;
  padding: 16px 18px;
  border-top: 1px solid rgba(255,255,255,.06);
  font-size: 11px; color: rgba(255,255,255,.25);
}

.sidebar-backdrop {
  display: none; position: fixed;
  top: var(--header-h); left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 790;
  backdrop-filter: blur(2px);
}

/* ========================================
   CONTENT
   ======================================== */
.content {
  flex: 1;
  margin-left: var(--sidebar-w);
  padding: 28px 28px 40px;
  min-width: 0;
  min-height: calc(100vh - var(--header-h));
}
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
}
.page-header-left {}
.page-title {
  font-size: 22px; font-weight: 700;
  color: var(--slate-900); letter-spacing: -0.5px;
  line-height: 1.2;
}
.page-subtitle { font-size: 12px; color: var(--slate-400); margin-top: 4px; font-weight: 400; }

/* ========================================
   STAT CARDS (Dashboard)
   ======================================== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--slate-200);
  position: relative; overflow: hidden;
  transition: transform var(--transition), box-shadow var(--transition);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 4px 0 0 4px;
}
.stat-card:nth-child(1)::before { background: var(--brand); }
.stat-card:nth-child(2)::before { background: var(--cyan); }
.stat-card:nth-child(3)::before { background: var(--violet); }
.stat-card:nth-child(4)::before { background: var(--emerald); }
.stat-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  color: var(--slate-400); text-transform: uppercase;
}
.stat-value {
  font-size: 36px; font-weight: 700;
  color: var(--slate-900); line-height: 1.1;
  margin-top: 8px; letter-spacing: -1px;
}
.stat-icon {
  position: absolute; right: 16px; top: 16px;
  font-size: 28px; opacity: .12;
}

/* ========================================
   SECTION / PANEL
   ======================================== */
.panel {
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid var(--slate-200);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin-bottom: 20px;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--slate-100);
  flex-wrap: wrap; gap: 12px;
}
.panel-title {
  font-size: 15px; font-weight: 700;
  color: var(--slate-900); letter-spacing: -0.3px;
}
.panel-body { padding: 0; overflow-x: auto; }
.panel-inner { padding: 20px 22px; }

/* ========================================
   TOOLBAR / FILTER
   ======================================== */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.filter-row {
  padding: 14px 22px;
  border-bottom: 1px solid var(--slate-100);
  display: flex; gap: 10px; flex-wrap: wrap;
}
.filter-input {
  flex: 1; min-width: 200px;
  padding: 8px 12px;
  border: 1px solid var(--slate-200);
  border-radius: var(--radius-md);
  font-size: 13px; font-family: var(--font-base);
  background: var(--slate-50); color: var(--slate-700);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.filter-input:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  background: var(--white);
}

/* ========================================
   BUTTONS
   ======================================== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  border: none; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 600;
  font-family: var(--font-base);
  cursor: pointer; transition: all var(--transition);
  white-space: nowrap; line-height: 1;
}
.btn-primary {
  background: var(--brand); color: var(--white);
  box-shadow: 0 1px 4px rgba(37,99,235,.3);
}
.btn-primary:hover { background: var(--brand-dim); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.35); }
.btn-secondary {
  background: var(--slate-100); color: var(--slate-600);
  border: 1px solid var(--slate-200);
}
.btn-secondary:hover { background: var(--slate-200); color: var(--slate-800); }
.btn-danger  { background: rgba(225,29,72,.1); color: var(--rose); border: 1px solid rgba(225,29,72,.2); }
.btn-danger:hover  { background: var(--rose); color: var(--white); }
.btn-success { background: rgba(5,150,105,.1); color: var(--emerald); border: 1px solid rgba(5,150,105,.2); }
.btn-success:hover { background: var(--emerald); color: var(--white); }
.btn-ghost   { background: transparent; color: var(--slate-500); border: 1px solid var(--slate-200); }
.btn-ghost:hover { background: var(--slate-100); }
.btn-sm  { padding: 6px 11px; font-size: 12px; border-radius: var(--radius-sm); }
.btn-xs  { padding: 4px 8px; font-size: 11px; border-radius: 4px; }
.btn-icon {
  padding: 7px; border-radius: var(--radius-sm);
  background: var(--slate-100); color: var(--slate-500); border: none;
  cursor: pointer; font-size: 14px; transition: all var(--transition);
}
.btn-icon:hover { background: var(--slate-200); color: var(--slate-700); }

/* ========================================
   TABLE
   ======================================== */
table { width: 100%; border-collapse: collapse; min-width: 500px; }
thead tr { background: var(--slate-50); }
th {
  padding: 11px 14px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  color: var(--slate-400); text-transform: uppercase;
  text-align: left; border-bottom: 1px solid var(--slate-200);
  white-space: nowrap;
}
td {
  padding: 13px 14px;
  font-size: 13px; color: var(--slate-600);
  border-bottom: 1px solid var(--slate-100);
  vertical-align: middle;
}
tbody tr { transition: background var(--transition); }
tbody tr:hover { background: var(--slate-50); }
tbody tr:last-child td { border-bottom: none; }
td.center { text-align: center; }
td.actions {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.cell-name {
  font-weight: 600; color: var(--slate-800);
}
.cell-sub {
  font-size: 11px; color: var(--slate-400); margin-top: 2px;
}
.empty-row td {
  text-align: center; padding: 44px 14px;
  color: var(--slate-400); font-size: 13px;
}
.empty-icon { font-size: 32px; display: block; margin-bottom: 10px; opacity: .4; }

/* ========================================
   BADGES (STATUS PILLS)
   ======================================== */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  white-space: nowrap;
}
.badge::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: currentColor; opacity: .7; flex-shrink: 0;
}
.badge-scheduled { background: rgba(124,58,237,.12); color: var(--violet); }
.badge-done      { background: rgba(99,102,241,.12); color: #4F46E5; }
.badge-passed    { background: rgba(5,150,105,.12); color: var(--emerald); }
.badge-failed    { background: rgba(225,29,72,.1); color: var(--rose); }
.badge-active    { background: rgba(37,99,235,.12); color: var(--brand); }
.badge-closed    { background: rgba(100,116,139,.1); color: var(--slate-500); }
.badge-eval      { background: rgba(13,148,136,.12); color: var(--teal); }
.badge-contract  { background: rgba(5,150,105,.12); color: var(--emerald); }
.badge-notif-info    { background: rgba(37,99,235,.12); color: var(--brand); }
.badge-notif-manual  { background: rgba(100,116,139,.1); color: var(--slate-500); }

/* ========================================
   MODAL
   ======================================== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
  backdrop-filter: blur(3px);
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--white);
  border-radius: var(--radius-lg);
  width: 500px; max-width: 100%; max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.modal-head {
  padding: 22px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 17px; font-weight: 700; color: var(--slate-900); letter-spacing: -0.4px; }
.modal-close {
  background: none; border: none;
  color: var(--slate-400); font-size: 18px; cursor: pointer;
  padding: 4px; border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.modal-close:hover { background: var(--slate-100); color: var(--slate-700); }
.modal-body   { padding: 0 24px; }
.modal-footer {
  padding: 20px 24px 24px;
  display: flex; justify-content: flex-end; gap: 10px;
  border-top: 1px solid var(--slate-100); margin-top: 20px;
}

/* ========================================
   FORM ELEMENTS
   ======================================== */
.form-group { margin-bottom: 15px; }
.form-group label {
  display: block; margin-bottom: 5px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
  color: var(--slate-600); text-transform: uppercase;
}
.form-control {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--slate-200);
  border-radius: var(--radius-md);
  font-size: 14px; font-family: var(--font-base);
  color: var(--slate-800); background: var(--white);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-control:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
}
.form-control[readonly] { background: var(--slate-50); color: var(--slate-500); }
.form-hint { font-size: 11px; color: var(--slate-400); margin-top: 5px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.resume-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(37,99,235,.07); border: 1px solid rgba(37,99,235,.2);
  border-radius: var(--radius-sm); padding: 7px 12px;
  margin-top: 8px; font-size: 12px; color: var(--brand);
}
.resume-tag a { color: var(--brand); text-decoration: none; font-weight: 600; }
.resume-tag a:hover { text-decoration: underline; }

/* ========================================
   ANALYTICS / BAR CHART
   ======================================== */
.bar-row {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
}
.bar-label { width: 90px; font-size: 12px; font-weight: 600; color: var(--slate-600); flex-shrink: 0; }
.bar-track {
  flex: 1; background: var(--slate-100); border-radius: 99px;
  height: 10px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--brand), var(--cyan));
  transition: width .6s cubic-bezier(0.34,1.56,0.64,1);
}
.bar-count { width: 30px; text-align: right; font-size: 13px; font-weight: 700; color: var(--slate-700); }

/* ========================================
   NOTIFICATION ITEMS
   ======================================== */
.notif-item {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--slate-100);
  transition: background var(--transition);
}
.notif-item:last-child { border-bottom: none; }
.notif-item.unread { background: rgba(37,99,235,.03); border-left: 3px solid var(--brand); }
.notif-item.unread:last-child { border-bottom: none; }
.notif-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--brand); margin-top: 5px; flex-shrink: 0;
}
.notif-text { font-size: 13px; color: var(--slate-700); }
.notif-time { font-size: 11px; color: var(--slate-400); margin-top: 3px; }

/* ========================================
   EVALUATION FORM
   ======================================== */
.eval-layout {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
}
.eval-comp-block {
  border: 1px solid var(--slate-200);
  border-radius: var(--radius-md); padding: 14px;
  margin-bottom: 12px; background: var(--slate-50);
}
.eval-comp-block:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(37,99,235,.08);
}
.comp-header { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.comp-header input { flex: 1; }
.comp-number {
  width: 24px; height: 24px;
  background: var(--brand); color: var(--white);
  border-radius: 50%; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.eval-add-btn {
  width: 100%; padding: 10px;
  border: 1.5px dashed var(--slate-300); background: transparent;
  border-radius: var(--radius-md); color: var(--slate-400);
  cursor: pointer; font-size: 13px; font-family: var(--font-base);
  transition: all var(--transition); margin-bottom: 14px;
}

.eval-candidate-info {

.eval-candidate-name { font-size: 16px; font-weight: 700; color: var(--slate-900); }

/* ========================================
   SYSTEM SETTINGS
   ======================================== */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.settings-divider { height: 1px; background: var(--slate-100); margin: 20px 0; }
.toggle-row {

}
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 13px; font-weight: 500; color: var(--slate-700); }
.toggle-desc  { font-size: 11px; color: var(--slate-400); margin-top: 2px; }
/* Custom checkbox toggle */
.switch { position: relative; display: inline-block; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0; cursor: pointer;
  background: var(--slate-300); border-radius: 99px;
  transition: background var(--transition);
}
.slider::before {
  content: ''; position: absolute;
  width: 16px; height: 16px; border-radius: 50%; background: var(--white);
  left: 3px; top: 3px; transition: transform var(--transition);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.switch input:checked + .slider { background: var(--brand); }
.switch input:checked + .slider::before { transform: translateX(18px); }

<!-- ============================================================
     FIREBASE + APP LOGIC
     ============================================================ -->
<script type="module">
import { initializeApp }                                          from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { isSupported as isAnalyticsSupported, getAnalytics }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc,
  addDoc, updateDoc, deleteDoc, setDoc,
  onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ── Firebase 설정 ── */
const firebaseConfig = {
  apiKey: "AIzaSyA1wwPmNs9Y_MVCANN6iqj0Nn6H1YHvm3w",
  authDomain: "recruitments-1d3a0.firebaseapp.com",
  projectId: "recruitments-1d3a0",
  storageBucket: "recruitments-1d3a0.firebasestorage.app",
  messagingSenderId: "115005966065",
  appId: "1:115005966065:web:7f6320ef3a862d888c8b50",
  measurementId: "G-363D2G3TFE"
};
const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

isAnalyticsSupported().then(ok => { if(ok) try { getAnalytics(app); } catch(e){} }).catch(()=>{});

/* ── Firestore 컬렉션 ── */
const colJobs          = collection(db, "jobPostings");
const colApplicants    = collection(db, "applicants");
const colNotifications = collection(db, "notifications");
const colAdmins        = collection(db, "admins");
const settingsDocRef   = doc(db, "settings", "general");

/* ── 상태 정의 ── */
const STATUSES = ["면접예정","면접완료","최종합격","불합격"];
const STATUS_META = {
  "면접예정": { cls:"badge-scheduled", label:"면접예정" },
  "면접완료": { cls:"badge-done",      label:"면접완료" },
  "최종합격": { cls:"badge-passed",    label:"최종합격" },
  "불합격":   { cls:"badge-failed",    label:"불합격"   }
};
const RESUME_MAX = 700 * 1024;

/* ── 전역 캐시 ── */
let jobsCache=[], applicantsCache=[], notificationsCache=[], adminsCache=[], settingsCache={};
let currentView="dashboard", interviewSearch="", evaluationId=null, evalDraft=null, evalSeq=0;

const contentEl = document.getElementById("content");

/* ── 유틸 ── */
const esc = s => s==null?"":String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtDate     = ts => { if(!ts)return"-"; const d=ts.toDate?ts.toDate():new Date(ts); return isNaN(d)?"-":d.toLocaleDateString("ko-KR"); };
const fmtDateTime = ts => { if(!ts)return"-"; const d=ts.toDate?ts.toDate():new Date(ts); return isNaN(d)?"-":d.toLocaleString("ko-KR"); };
const fmtBytes    = b  => !b?"0KB": b<1048576? Math.round(b/1024)+"KB" : (b/1048576).toFixed(1)+"MB";
const uid         = ()  => "c"+(++evalSeq)+"_"+Date.now();
const CIRCLED     = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮"];

function statusBadge(s) {
  const m=STATUS_META[s]||{cls:"badge-closed",label:s||"-"};
  return `<span class="badge ${m.cls}">${esc(m.label)}</span>`;
}
function jobBadge(s) {
  return s==="진행중"
    ? `<span class="badge badge-active">진행중</span>`
    : `<span class="badge badge-closed">마감</span>`;
}
async function notify(message, type="info") {
  try { await addDoc(colNotifications, { message, type, read:false, createdAt:serverTimestamp() }); } catch(e) {}
}
function getApplicantName(id) {
  const a = applicantsCache.find(x=>x.id===id);
  return a?a.name:"지원자";
}

/* ── 모달 ── */
function showModal(html) {
  closeModal();
  const ov = document.createElement("div");
  ov.className="modal-overlay"; ov.id="modalOverlay";
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.addEventListener("click", e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() {
  const ov=document.getElementById("modalOverlay");
  if(ov) ov.remove();
}

/* ── 파일 읽기 ── */
function readFile(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(r.error); r.readAsDataURL(file); });
}

/* ── 라우터 ── */
function rerender() {
  switch(currentView) {
    case"dashboard":      renderDashboard(); break;
    case"jobs":           renderJobs(); break;
    case"interviews":     renderInterviews(); break;
    case"finalHires":     renderFinalHires(); break;
    case"notifications":  renderNotifications(); break;
    case"system":         renderSystem(); break;
    case"evaluationForm": renderEvaluationForm(); break;
  }
  updateUnreadBadge();
}
function switchView(v) {
  currentView=v;
  document.querySelectorAll(".sidebar-nav a[data-view]").forEach(el=>el.classList.toggle("active",el.dataset.view===v));
  rerender();
}
function updateUnreadBadge() {
  const cnt=notificationsCache.filter(n=>!n.read).length;
  const el=document.getElementById("unreadBadge");
  if(!el)return;
  el.textContent=cnt; el.style.display=cnt>0?"inline-flex":"none";
}

/* ══════════════════════════════════════════
   1. 대시보드
   ══════════════════════════════════════════ */
function renderDashboard() {
  const activeJobs=jobsCache.filter(j=>j.status==="진행중").length;
  const total=applicantsCache.length;
  const upcoming=applicantsCache.filter(a=>a.status==="면접예정").length;
  const passed=applicantsCache.filter(a=>a.status==="최종합격").length;
  const recent=applicantsCache.slice(0,6);

  const rows=recent.length ? recent.map(a=>`
    <tr>
      <td><div class="cell-name">${esc(a.name)}</div></td>
      <td>${esc(a.jobTitle||"-")}</td>
      <td>${esc(a.experience||"-")}</td>
      <td>${a.interviewDate||"-"}</td>
      <td>${statusBadge(a.status)}</td>
    </tr>`).join("") :
    `<tr class="empty-row"><td colspan="5"><span class="empty-icon">📭</span>등록된 지원자가 없습니다.</td></tr>`;

  contentEl.innerHTML=`
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">대시보드</div>
        <div class="page-subtitle">채용 현황을 한 눈에 확인하세요</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">진행중 공고</div><div class="stat-value">${activeJobs}</div><div class="stat-icon">📋</div></div>
      <div class="stat-card"><div class="stat-label">총 지원자</div><div class="stat-value">${total}</div><div class="stat-icon">👥</div></div>
      <div class="stat-card"><div class="stat-label">면접 예정</div><div class="stat-value">${upcoming}</div><div class="stat-icon">🗓</div></div>
      <div class="stat-card"><div class="stat-label">최종 합격</div><div class="stat-value">${passed}</div><div class="stat-icon">🏆</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">최근 지원자 현황</span>
        <button class="btn btn-ghost btn-sm" data-action="go-interviews">전체 보기 →</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>성명</th><th>지원직무</th><th>경력</th><th>면접일</th><th>상태</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════
   2. 채용공고관리
   ══════════════════════════════════════════ */
function renderJobs() {
  const rows=jobsCache.length ? jobsCache.map(j=>`
    <tr>
      <td><div class="cell-name">${esc(j.title)}</div></td>
      <td>${esc(j.department||"-")}</td>
      <td>${esc(j.position||"-")}</td>
      <td class="center">${j.headcount||0}명</td>
      <td class="center">${j.deadline||"-"}</td>
      <td class="center">${jobBadge(j.status)}</td>
      <td class="actions">
        <button class="btn btn-secondary btn-sm" data-action="edit-job" data-id="${j.id}">수정</button>
        <button class="btn btn-danger btn-sm" data-action="remove-job" data-id="${j.id}">삭제</button>
      </td>
    </tr>`).join("") :
    `<tr class="empty-row"><td colspan="7"><span class="empty-icon">📋</span>등록된 채용공고가 없습니다.<br><small>우측 상단 버튼으로 첫 공고를 등록하세요.</small></td></tr>`;

  contentEl.innerHTML=`
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">채용공고 관리</div>
        <div class="page-subtitle">총 ${jobsCache.length}건 · 진행중 ${jobsCache.filter(j=>j.status==="진행중").length}건</div>
      </div>
      <button class="btn btn-primary" data-action="open-job-modal">+ 공고 등록</button>
    </div>
    <div class="panel">
      <div class="panel-body">
        <table>
          <thead><tr><th>공고명</th><th>부서</th><th>직무</th><th style="text-align:center">모집인원</th><th style="text-align:center">마감일</th><th style="text-align:center">상태</th><th>관리</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}
function openJobModal(id) {
  const job=id?jobsCache.find(j=>j.id===id):null;
  showModal(`
    <div class="modal-head">
      <span class="modal-title">${job?"채용공고 수정":"채용공고 등록"}</span>
      <button class="modal-close" data-action="close-modal">✕</button>
    </div>
    <div class="modal-body">
      <form id="jobForm">
        <div class="form-group"><label>공고명 *</label><input class="form-control" name="title" required value="${job?esc(job.title):""}"></div>
        <div class="form-row">
          <div class="form-group"><label>부서</label><input class="form-control" name="department" value="${job?esc(job.department||""):""}"></div>
          <div class="form-group"><label>직무</label><input class="form-control" name="position" value="${job?esc(job.position||""):""}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>모집인원</label><input class="form-control" type="number" name="headcount" min="0" value="${job?(job.headcount||0):1}"></div>
          <div class="form-group"><label>마감일</label><input class="form-control" type="date" name="deadline" value="${job?(job.deadline||""):""}"></div>
        </div>
        <div class="form-group"><label>상태</label>
          <select class="form-control" name="status">
            <option value="진행중" ${job&&job.status==="진행중"?"selected":""}>진행중</option>
            <option value="마감"   ${job&&job.status==="마감"?"selected":""}>마감</option>
          </select>
        </div>
        <div class="modal-footer" style="padding:0;border:none;margin-top:4px;">
          <button type="button" class="btn btn-secondary" data-action="close-modal">취소</button>
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>`);
  document.getElementById("jobForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const data={ title:fd.get("title").trim(), department:fd.get("department").trim(), position:fd.get("position").trim(), headcount:Number(fd.get("headcount"))||0, deadline:fd.get("deadline"), status:fd.get("status") };
    try {
      if(job) await updateDoc(doc(db,"jobPostings",job.id),data);
      else    await addDoc(colJobs,{...data, createdAt:serverTimestamp()});
      closeModal();
    } catch(err) { alert("저장 오류: "+err.message); }
  });
}
async function removeJob(id) {
  if(!confirm("채용공고를 삭제하시겠습니까?")) return;
  try { await deleteDoc(doc(db,"jobPostings",id)); } catch(err) { alert("삭제 오류: "+err.message); }
}

/* ══════════════════════════════════════════
   3. 면접관리
   ══════════════════════════════════════════ */
function renderInterviews() {
  let list=applicantsCache.slice();
  if(interviewSearch.trim()) {
    const t=interviewSearch.trim();
    list=list.filter(a=>(a.name&&a.name.includes(t))||(a.jobTitle&&a.jobTitle.includes(t))||(a.phone&&a.phone.includes(t)));
  }
  const rows=list.length ? list.map(a=>{
    const dtLabel=[a.interviewDate,a.interviewTime].filter(Boolean).join(" ")||"-";
    const resumeCell=a.resume&&a.resume.dataUrl
      ?`<a href="javascript:void(0)" data-action="view-resume" data-id="${a.id}" style="color:var(--brand);font-weight:600;">${esc(a.resume.fileName||"이력서")}</a>`
      :`<span style="color:var(--slate-300);">미첨부</span>`;
    const evalBadge=a.evaluation?`<span class="badge badge-eval" style="margin-top:5px;display:inline-flex;">평가서</span>`:"";
    const actionBtns=

      name:fd.get("name").trim(), jobPostingId:jobId,
      jobTitle: job?job.title:(fd.get("jobTitleManual")||"").trim()||"-",

      email:fd.get("email").trim(), interviewDate:fd.get("interviewDate")||"",
      interviewTime:fd.get("interviewTime")||"", notes:fd.get("notes").trim()
    };
    const fi=document.getElementById("resumeFileInput");
    const file=fi&&fi.files&&fi.files[0];
    if(file) {
      if(file.size>RESUME_MAX){ alert(`이력서 크기 초과 (최대 ${fmtBytes(RESUME_MAX)}, 선택: ${fmtBytes(file.size)})`); return; }
      try { data.resume={ fileName:file.name, mimeType:file.type||"application/octet-stream", size:file.size, dataUrl:await readFile(file) }; }

    try {

      closeModal();
    } catch(err) {
      if(/longer than|exceeds|size/i.test(err.message||"")) alert("첨부 파일을 포함한 용량이 너무 큽니다. 더 작은 파일을 사용해주세요.");
      else alert("저장 오류: "+err.message);

  try { await deleteDoc(doc(db,"applicants",id)); } catch(err) { alert("삭제 오류: "+err.message); }
}

      if(status==="최종합격") notify(`${getApplicantName(id)}님이 최종합격 처리되었습니다.`,"final");

      if(status==="면접완료") notify(`${getApplicantName(id)}님의 면접이 완료되었습니다.`,"interview");
    }

}
function viewResume(id) {
  const a=applicantsCache.find(x=>x.id===id);
  if(!a||!a.resume||!a.resume.dataUrl){ alert("첨부된 이력서가 없습니다."); return; }

  if(mimeType&&(mimeType.startsWith("image/")||mimeType==="application/pdf")) {

}

function initEvalDraft(applicant) {
  const ex=applicant&&applicant.evaluation;
  if(ex&&ex.competencies&&ex.competencies.length) {
    evalDraft={ competencies:ex.competencies.map(c=>({id:uid(),title:c.title||"",itemsText:c.itemsText||""})), personality:ex.personality||"", strengths:ex.strengths||"", risks:ex.risks||"", comment:ex.comment||"", recommendation:ex.recommendation||"채용추천" };
  } else {
    evalDraft={ competencies:[{id:uid(),title:"직무 역량",itemsText:""},{id:uid(),title:"부가 역량",itemsText:""}], personality:"", strengths:"", risks:"", comment:"", recommendation:"채용추천" };
  }
}
function openEvaluationView(id) {
  evaluationId=id;
  const a=applicantsCache.find(x=>x.id===id);
  initEvalDraft(a);
  currentView="evaluationForm"; rerender();
}
function numberedList(text) {
  const lines=(text||"").split("\n").map(s=>s.trim()).filter(Boolean);
  if(!lines.length) return "";
  return lines.map((l,i)=>(CIRCLED[i]||(i+1)+".")+` ${l}`).join("\n");
}
function buildReport(applicant, draft) {
  const out=[];
  const dt=[applicant.interviewDate,applicant.interviewTime].filter(Boolean).join(" ");
  out.push(`▶ ${applicant.name||"후보자"} (${applicant.jobTitle||"-"})${dt?" — "+dt:""}`);
  let n=1;
  draft.competencies.forEach(c=>{
    const body=numberedList(c.itemsText);
    if(!c.title.trim()&&!body)return;
    out.push(""); out.push(`${n}. ${c.title.trim()||"역량"} 역량`);
    if(body) out.push(body); n++;
  });
  if(draft.personality&&draft.personality.trim()){out.push(""); out.push(`${n}. 성격 및 업무 태도`); out.push(numberedList(draft.personality)); n++;}
  if(draft.strengths&&draft.strengths.trim()){out.push(""); out.push(`${n}. 주요 장점`); out.push(numberedList(draft.strengths)); n++;}
  if(draft.risks&&draft.risks.trim()){out.push(""); out.push(`${n}. 주요 단점 및 채용 리스크`); out.push(numberedList(draft.risks)); n++;}
  out.push(""); out.push(`[종합의견] ${draft.comment&&draft.comment.trim()?draft.comment.trim():"-"}`);
  out.push(`[추천여부] ${draft.recommendation||"-"}`);
  return out.join("\n");
}

    return;
  }
  if(!evalDraft) initEvalDraft(applicant);
  const dt=[applicant.interviewDate,applicant.interviewTime].filter(Boolean).join(" ");
  const compHtml=evalDraft.competencies.map((c,i)=>`
    <div class="eval-comp-block">
      <div class="comp-header">
        <div class="comp-number">${i+1}</div>
        <input class="form-control" placeholder="역량 항목명 (예: 직무 역량)" data-comp-title="${c.id}" value="${esc(c.title)}">
        <button type="button" class="btn btn-danger btn-xs" data-action="remove-comp-block" data-id="${c.id}">삭제</button>
      </div>
      <textarea class="form-control" rows="4" placeholder="한 줄에 한 항목씩 입력 — 자동으로 ①②③... 번호가 붙습니다" data-comp-items="${c.id}">${esc(c.itemsText)}</textarea>
    </div>`).join("");

  contentEl.innerHTML=`
    <div class="page-header" style="margin-bottom:16px;">
      <div>
        <button class="btn btn-secondary btn-sm" data-action="back-to-interviews">← 면접관리로</button>
      </div>
    </div>

      <div class="eval-avatar">👤</div>
      <div>
        <div class="eval-candidate-name">${esc(applicant.name)}</div>
        <div class="eval-candidate-meta">${esc(applicant.jobTitle||"-")} · 면접일시: ${dt||"-"}</div>
      </div>
      <div style="margin-left:auto;">${statusBadge(applicant.status)}</div>
    </div>
    <div class="eval-layout" id="evalLayout">
      <!-- LEFT: 입력 폼 -->
      <div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">핵심 역량 평가</span></div>
          <div class="panel-inner">
            <form id="evalForm">
              ${compHtml}
              <button type="button" class="eval-add-btn" data-action="add-comp-block">+ 역량 항목 추가</button>
              <div class="form-group"><label>성격 및 업무 태도</label><textarea class="form-control" name="personality" rows="3" placeholder="한 줄에 한 항목씩">${esc(evalDraft.personality)}</textarea></div>
              <div class="form-group"><label>주요 장점</label><textarea class="form-control" name="strengths" rows="3" placeholder="한 줄에 한 항목씩">${esc(evalDraft.strengths)}</textarea></div>
              <div class="form-group"><label>주요 단점 / 채용 리스크</label><textarea class="form-control" name="risks" rows="3" placeholder="한 줄에 한 항목씩">${esc(evalDraft.risks)}</textarea></div>
              <div class="form-group"><label>종합의견</label><textarea class="form-control" name="comment" rows="3">${esc(evalDraft.comment)}</textarea></div>
              <div class="form-group"><label>추천여부</label>
                <select class="form-control" name="recommendation">
                  <option value="채용추천" ${evalDraft.recommendation==="채용추천"?"selected":""}>채용추천</option>
                  <option value="보류"     ${evalDraft.recommendation==="보류"?"selected":""}>보류</option>
                  <option value="비추천"   ${evalDraft.recommendation==="비추천"?"selected":""}>비추천</option>
                </select>
              </div>
              <button type="button" class="btn btn-primary" data-action="save-evaluation" style="width:100%;">평가서 저장</button>
            </form>
          </div>
        </div>
      </div>
      <!-- RIGHT: 미리보기 -->
      <div>
        <div class="eval-preview-label">자동 생성 미리보기</div>
        <div class="eval-preview-panel" id="evalPreview"></div>
        <div class="eval-preview-actions">
          <button type="button" class="btn btn-ghost btn-sm" data-action="copy-evaluation">📋 복사</button>
          <button type="button" class="btn btn-ghost btn-sm" data-action="print-evaluation">🖨 인쇄 / PDF</button>
        </div>
      </div>
    </div>`;
  updateEvalPreview();
}
function syncDraft() {
  const form=document.getElementById("evalForm");
  if(!form||!evalDraft)return;
  evalDraft.competencies.forEach(c=>{
    const t=form.querySelector(`[data-comp-title="${c.id}"]`); if(t)c.title=t.value;
    const i=form.querySelector(`[data-comp-items="${c.id}"]`); if(i)c.itemsText=i.value;
  });
  ["personality","strengths","risks","comment","recommendation"].forEach(n=>{
    const el=form.querySelector(`[name="${n}"]`); if(el)evalDraft[n]=el.value;
  });
}
function updateEvalPreview() {
  const a=applicantsCache.find(x=>x.id===evaluationId);
  const el=document.getElementById("evalPreview");
  if(!a||!el||!evalDraft)return;
  el.textContent=buildReport(a,evalDraft);
}
function addCompBlock(){ syncDraft(); evalDraft.competencies.push({id:uid(),title:"",itemsText:""}); renderEvaluationForm(); }
function removeCompBlock(id){ syncDraft(); if(evalDraft.competencies.length<=1){alert("최소 1개는 남아야 합니다.");return;} evalDraft.competencies=evalDraft.competencies.filter(c=>c.id!==id); renderEvaluationForm(); }
async function saveEvaluation() {
  syncDraft();
  const a=applicantsCache.find(x=>x.id===evaluationId);
  if(!a)return;
  const reportText=buildReport(a,evalDraft);
  try {
    await updateDoc(doc(db,"applicants",a.id),{ evaluation:{
      competencies:evalDraft.competencies.map(c=>({title:c.title,itemsText:c.itemsText})),
      personality:evalDraft.personality, strengths:evalDraft.strengths, risks:evalDraft.risks,
      comment:evalDraft.comment, recommendation:evalDraft.recommendation, reportText, updatedAt:serverTimestamp()
    }});
    if(settingsCache.autoNotify!==false) notify(`${a.name}님의 면접 평가서가 저장되었습니다.`,"evaluation");
    alert("평가서가 저장되었습니다.");
  } catch(err){ alert("저장 오류: "+err.message); }
}
async function copyEvaluation(){
  syncDraft();
  const a=applicantsCache.find(x=>x.id===evaluationId); if(!a)return;
  try{ await navigator.clipboard.writeText(buildReport(a,evalDraft)); alert("클립보드에 복사되었습니다."); }
  catch(e){ alert("자동 복사 실패. 미리보기 영역을 직접 선택해 복사해주세요."); }
}
function printEvaluation(){
  syncDraft();
  const a=applicantsCache.find(x=>x.id===evaluationId); if(!a)return;
  const text=buildReport(a,evalDraft);
  const w=window.open("","_blank");
  if(!w){alert("팝업이 차단되었습니다.");return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>면접 평가서 - ${esc(a.name)}</title><style>body{font-family:'Malgun Gothic','Noto Sans KR',sans-serif;padding:32px;max-width:680px;margin:auto;color:#1e293b;}pre{white-space:pre-wrap;font-size:14px;line-height:1.9;}</style></head><body><pre>${esc(text)}</pre></body></html>`);
  w.document.close(); w.focus(); w.print();
}

function renderFinalHires() {
  const list=applicantsCache.filter(a=>a.status==="최종합격");
  const rows=list.length ? list.map(a=>`
    <tr>
      <td><div class="cell-name">${esc(a.name)}</div></td>
      <td>${esc(a.jobTitle||"-")}</td>
      <td>${esc(a.email||"-")}</td>
      <td>${esc(a.phone||"-")}</td>
      <td class="center">${a.interviewDate||"-"}</td>
      <td class="center">${a.contractCreated?`<span class="badge badge-contract">계약완료</span>`:
        `<button class="btn btn-success btn-sm" data-action="register-contract" data-id="${a.id}">계약 등록</button>`}</td>
    </tr>`).join("") :
    `<tr class="empty-row"><td colspan="6"><span class="empty-icon">🏆</span>최종합격자가 없습니다.</td></tr>`;

  contentEl.innerHTML=`
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">최종합격 관리</div>
        <div class="page-subtitle">합격자 계약 현황 · 총 ${list.length}명</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-body">
        <table>
          <thead><tr><th>성명</th><th>지원직무</th><th>이메일</th><th>연락처</th><th style="text-align:center">면접일</th><th style="text-align:center">계약</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}
function openContractSimpleModal(applicantId) {
  const a=applicantsCache.find(x=>x.id===applicantId);
  if(!a)return;
  showModal(`
    <div class="modal-head">
      <span class="modal-title">계약 등록 — ${esc(a.name)}</span>
      <button class="modal-close" data-action="close-modal">✕</button>
    </div>
    <div class="modal-body">
      <form id="contractSimpleForm">
        <div class="form-group"><label>입사예정일</label><input class="form-control" type="date" name="startDate"></div>
        <div class="form-group"><label>직무</label><input class="form-control" name="position" value="${esc(a.jobTitle||"")}" readonly></div>
        <div class="form-group"><label>연봉 (만원)</label><input class="form-control" type="number" name="salary" min="0" value="0"></div>
        <div class="modal-footer" style="padding:0;border:none;margin-top:4px;">
          <button type="button" class="btn btn-secondary" data-action="close-modal">취소</button>
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>`);
  document.getElementById("contractSimpleForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    try {
      await updateDoc(doc(db,"applicants",a.id),{ contractCreated:true });
      notify(`${a.name}님의 계약이 등록되었습니다.`,"contract");
      closeModal();
    } catch(err){ alert("저장 오류: "+err.message); }
  });
}

/* ══════════════════════════════════════════
   5. 알림관리
   ══════════════════════════════════════════ */
function renderNotifications() {
  const unread=notificationsCache.filter(n=>!n.read).length;
  const items=notificationsCache.length ? notificationsCache.map(n=>`
    <div class="notif-item ${n.read?"":"unread"}">
      <div style="display:flex;gap:10px;align-items:flex-start;min-width:0;">
        ${!n.read?`<div class="notif-dot"></div>`:`<div style="width:8px;flex-shrink:0;"></div>`}
        <div style="min-width:0;">
          <div class="notif-text">${esc(n.message)}</div>
          <div class="notif-time">${fmtDateTime(n.createdAt)}</div>
        </div>
      </div>
      <div class="toolbar" style="flex-shrink:0;">
        ${!n.read?`<button class="btn btn-ghost btn-xs" data-action="mark-notif-read" data-id="${n.id}">읽음</button>`:""}
        <button class="btn btn-danger btn-xs" data-action="delete-notif" data-id="${n.id}">삭제</button>
      </div>
    </div>`).join("") :
    `<div style="text-align:center;padding:44px;color:var(--slate-400);">
       <div style="font-size:32px;margin-bottom:10px;">🔔</div>알림이 없습니다.
     </div>`;

  contentEl.innerHTML=`
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">알림 관리</div>
        <div class="page-subtitle">읽지 않은 알림 ${unread}건</div>
      </div>
    </div>
    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-inner" style="padding-bottom:16px;">
        <form id="notifForm" style="display:flex;gap:10px;">
          <input class="filter-input" name="message" placeholder="알림 내용을 입력하세요" required style="flex:1;">
          <button type="submit" class="btn btn-primary">추가</button>
        </form>
      </div>
    </div>
    <div class="panel"><div>${items}</div></div>`;

  document.getElementById("notifForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const msg=fd.get("message").trim();
    if(!msg)return;
    await notify(msg,"manual"); e.target.reset();
  });
}
async function markRead(id){ try{ await updateDoc(doc(db,"notifications",id),{read:true}); }catch(e){} }
async function deleteNotif(id){ try{ await deleteDoc(doc(db,"notifications",id)); }catch(e){} }

/* ══════════════════════════════════════════
   6. 시스템 설정
   ══════════════════════════════════════════ */
function renderSystem() {
  const s=settingsCache||{};
  const adminRows=adminsCache.length ? adminsCache.map(a=>`
    <tr>
      <td><div class="cell-name">${esc(a.name)}</div></td>
      <td>${esc(a.email)}</td>
      <td>${esc(a.role||"운영자")}</td>
      <td class="actions"><button class="btn btn-danger btn-xs" data-action="remove-admin" data-id="${a.id}">삭제</button></td>
    </tr>`).join("") :
    `<tr class="empty-row"><td colspan="4"><span class="empty-icon">👤</span>등록된 운영자가 없습니다.</td></tr>`;

  contentEl.innerHTML=`
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">시스템 설정</div>
        <div class="page-subtitle">회사 정보 및 시스템 동작 방식을 설정합니다</div>
      </div>
    </div>
    <div class="panel" style="margin-bottom:20px;">
      <div class="panel-header"><span class="panel-title">기본 설정</span></div>
      <div class="panel-inner">
        <form id="settingsForm">
          <div class="settings-grid">
            <div class="form-group"><label>회사명</label><input class="form-control" name="companyName" value="${esc(s.companyName||"")}" placeholder="주식회사 예시"></div>
            <div class="form-group"><label>알림 수신 이메일</label><input class="form-control" type="email" name="notifyEmail" value="${esc(s.notifyEmail||"")}" placeholder="hr@company.com"></div>
          </div>
          <div class="settings-divider"></div>
          <div class="toggle-row">
            <div><div class="toggle-label">상태 변경 시 자동 알림 생성</div><div class="toggle-desc">합격·불합격·등록 등 상태가 바뀔 때 알림 항목을 자동으로 만듭니다</div></div>
            <label class="switch"><input type="checkbox" name="autoNotify" ${s.autoNotify!==false?"checked":""}><span class="slider"></span></label>
          </div>
          <div style="margin-top:20px;">
            <button type="submit" class="btn btn-primary">설정 저장</button>
          </div>
        </form>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">운영자 관리</span>
        <button class="btn btn-primary btn-sm" data-action="open-admin-modal">+ 운영자 추가</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>관리</th></tr></thead>
          <tbody>${adminRows}</tbody>
        </table>
      </div>
      <div class="panel-inner" style="padding-top:12px;">
        <p style="font-size:11px;color:var(--slate-400);">※ 실제 로그인·권한 분리는 Firebase Authentication 콘솔에서 계정을 관리하세요.</p>
      </div>
    </div>`;

  document.getElementById("settingsForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const data={ companyName:fd.get("companyName").trim(), notifyEmail:fd.get("notifyEmail").trim(), autoNotify:fd.get("autoNotify")==="on" };
    try { await setDoc(settingsDocRef,data); alert("설정이 저장되었습니다."); } catch(err){ alert("저장 오류: "+err.message); }
  });
}
function openAdminModal(){
  showModal(`
    <div class="modal-head">
      <span class="modal-title">운영자 추가</span>
      <button class="modal-close" data-action="close-modal">✕</button>
    </div>
    <div class="modal-body">
      <form id="adminForm">
        <div class="form-group"><label>이름 *</label><input class="form-control" name="name" required></div>
        <div class="form-group"><label>이메일 *</label><input class="form-control" type="email" name="email" required></div>
        <div class="form-group"><label>역할</label><input class="form-control" name="role" placeholder="예: 인사담당자"></div>
        <div class="modal-footer" style="padding:0;border:none;margin-top:4px;">
          <button type="button" class="btn btn-secondary" data-action="close-modal">취소</button>
          <button type="submit" class="btn btn-primary">추가</button>
        </div>
      </form>
    </div>`);
  document.getElementById("adminForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    try { await addDoc(colAdmins,{name:fd.get("name").trim(),email:fd.get("email").trim(),role:fd.get("role").trim()}); closeModal(); }
    catch(err){ alert("저장 오류: "+err.message); }
  });
}
async function removeAdmin(id){ if(!confirm("삭제하시겠습니까?"))return; try{ await deleteDoc(doc(db,"admins",id)); }catch(err){alert("삭제 오류: "+err.message);} }

/* ══════════════════════════════════════════
   이벤트 위임
   ══════════════════════════════════════════ */
contentEl.addEventListener("click", e=>{
  const el=e.target.closest("[data-action]"); if(!el)return;
  const action=el.dataset.action, id=el.dataset.id;
  switch(action){
    case"go-interviews":         switchView("interviews"); break;
    case"open-job-modal":        openJobModal(); break;
    case"edit-job":              openJobModal(id); break;
    case"remove-job":            removeJob(id); break;
    case"open-applicant-modal":  openApplicantModal(); break;
    case"edit-applicant":        openApplicantModal(id); break;
    case"remove-applicant":      removeApplicant(id); break;
    case"view-resume":           viewResume(id); break;
    case"interview-done":        updateStatus(id,"면접완료"); break;
    case"interview-pass":        updateStatus(id,"최종합격"); break;
    case"interview-fail":        updateStatus(id,"불합격"); break;
    case"register-contract":     openContractSimpleModal(id); break;
    case"mark-notif-read":       markRead(id); break;
    case"delete-notif":          deleteNotif(id); break;
    case"open-admin-modal":      openAdminModal(); break;
    case"remove-admin":          removeAdmin(id); break;
    case"open-evaluation":       openEvaluationView(id); break;
    case"back-to-interviews":    evaluationId=null; evalDraft=null; switchView("interviews"); break;
    case"add-comp-block":        addCompBlock(); break;
    case"remove-comp-block":     removeCompBlock(id); break;
    case"save-evaluation":       saveEvaluation(); break;
    case"copy-evaluation":       copyEvaluation(); break;
    case"print-evaluation":      printEvaluation(); break;
    case"close-modal":           closeModal(); break;
  }
});
contentEl.addEventListener("input", e=>{
  if(e.target.closest("#evalForm")){ syncDraft(); updateEvalPreview(); }
});

/* ══════════════════════════════════════════
   사이드바 네비게이션 + 모바일 토글
   ══════════════════════════════════════════ */
const sidebarEl=document.getElementById("sidebar");
const backdropEl=document.getElementById("sidebarBackdrop");
const menuToggleEl=document.getElementById("menuToggle");
function toggleSidebar(open){
  const will=open!==undefined?open:!sidebarEl.classList.contains("open");
  sidebarEl.classList.toggle("open",will);
  backdropEl.classList.toggle("show",will);
}
menuToggleEl.addEventListener("click",()=>toggleSidebar());
backdropEl.addEventListener("click",()=>toggleSidebar(false));
document.querySelectorAll(".sidebar-nav a[data-view]").forEach(el=>{
  el.addEventListener("click",()=>{ switchView(el.dataset.view); toggleSidebar(false); });
});

/* ══════════════════════════════════════════
   Firestore 실시간 리스너
   ══════════════════════════════════════════ */
function setupListeners(){
  onSnapshot(colJobs, snap=>{ jobsCache=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.())||0-(a.createdAt?.toMillis?.())||0); rerender(); }, e=>console.error(e));
  onSnapshot(colApplicants, snap=>{ applicantsCache=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.())||0-(a.createdAt?.toMillis?.())||0); rerender(); }, e=>console.error(e));
  onSnapshot(colNotifications, snap=>{ notificationsCache=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.toMillis?.())||0-(a.createdAt?.toMillis?.())||0); rerender(); }, e=>console.error(e));
  onSnapshot(colAdmins, snap=>{ adminsCache=snap.docs.map(d=>({id:d.id,...d.data()})); rerender(); }, e=>console.error(e));
  onSnapshot(settingsDocRef, snap=>{ settingsCache=snap.exists()?snap.data():{}; rerender(); }, e=>console.error(e));
}

/* ══════════════════════════════════════════
   로그인 / 인증
   ══════════════════════════════════════════ */
const loginScreenEl=document.getElementById("loginScreen");
const loginFormEl=document.getElementById("loginForm");
const loginErrorEl=document.getElementById("loginError");
const authLabelEl=document.getElementById("authUserLabel");
const logoutBtnEl=document.getElementById("logoutBtn");
let listenersStarted=false;

loginFormEl.addEventListener("submit", async e=>{
  e.preventDefault();
  loginErrorEl.style.display="none";
  const fd=new FormData(e.target);
  try { await signInWithEmailAndPassword(auth,fd.get("email").trim(),fd.get("password")); }
  catch(err){ loginErrorEl.style.display="block"; }
});
logoutBtnEl.addEventListener("click",()=>signOut(auth));

onAuthStateChanged(auth, user=>{
  if(user){
    loginScreenEl.style.display="none";
    authLabelEl.textContent=user.email||"";
    logoutBtnEl.style.display="inline-flex";
    if(!listenersStarted){ listenersStarted=true; setupListeners(); switchView("dashboard"); }
  } else {
    loginScreenEl.style.display="flex";
    authLabelEl.textContent=""; logoutBtnEl.style.display="none";
    loginFormEl.reset(); loginErrorEl.style.display="none";
  }
});

/* ══════════════════════════════════════════
   Firestore 보안 규칙 (Firebase 콘솔에서 설정)
   ──────────────────────────────────────────
   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {
       match /{document=**} {
         allow read, write: if request.auth != null;
       }
     }
   }
   ══════════════════════════════════════════ */
</script>
